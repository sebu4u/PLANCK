<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Planul înclinat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; }
    .sim { width: 100%; height: 100%; display: flex; flex-direction: column; gap: 6px; padding: 2px; }
    .controls { flex: 0 0 auto; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px 8px; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 5px; min-width: 0; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    .row input[type=range] { flex: 1; min-width: 0; accent-color: var(--accent); height: 24px; }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 28px; text-align: right; }
    .stage { flex: 1 1 auto; min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    @media (max-width: 520px) {
      .controls { grid-template-columns: 1fr; gap: 4px; }
      .row { min-height: 32px; }
      .row input[type=range] { height: 28px; }
      .stage { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row"><label for="theta">θ</label><input id="theta" type="range" min="5" max="60" step="1" value="30"><span class="val" id="thetaVal">30°</span></div>
      <div class="row"><label for="m">m</label><input id="m" type="range" min="1" max="20" step="1" value="5"><span class="val" id="mVal">5</span></div>
      <div class="row"><label for="mu">μ</label><input id="mu" type="range" min="0" max="80" step="1" value="20"><span class="val" id="muVal">0.20</span></div>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const G = 9.81;
    const BW = 34, BH = 26;

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let theta = 30, mass = 5, mu = 0.2;
    let s = 0.08, v = 0, sliding = false;
    let dragging = false, pointerId = null;
    let ramp = {};

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Planul înclinat",
        text: dragging ? "Trage corpul pe plan." : sliding ? "Corpul alunecă spre bază." : "Eliberează — corpul cade pe plan.",
        paused
      }, "*");
    }

    function rad() { return theta * Math.PI / 180; }
    function Gx() { return mass * G * Math.sin(rad()); }
    function Gy() { return mass * G * Math.cos(rad()); }
    function N() { return Gy(); }
    function Ff() { return mu * N(); }

    function computeRamp() {
      const th = rad();
      const baseY = cssH * 0.8;
      const len = Math.min(cssW * 0.72, (baseY - cssH * 0.14) / Math.sin(th));
      const baseX = cssW * 0.82;
      const apexX = baseX - len * Math.cos(th);
      const apexY = baseY - len * Math.sin(th);
      ramp = { apexX, apexY, baseX, baseY, footX: apexX, th, len };
    }

    function sMin() { return Math.min(0.12, (BW / 2) / Math.max(ramp.len, 1)); }
    function sMax() { return Math.max(sMin(), 1 - (BW / 2) / Math.max(ramp.len, 1)); }

    function clampS(val) {
      return Math.max(sMin(), Math.min(sMax(), val));
    }

    function posAt(t) {
      t = clampS(t);
      return {
        x: ramp.apexX + t * (ramp.baseX - ramp.apexX),
        y: ramp.apexY + t * (ramp.baseY - ramp.apexY)
      };
    }

    function projectToRamp(px, py) {
      const ax = ramp.apexX, ay = ramp.apexY;
      const bx = ramp.baseX, by = ramp.baseY;
      const dx = bx - ax, dy = by - ay;
      const len2 = dx * dx + dy * dy || 1;
      let t = ((px - ax) * dx + (py - ay) * dy) / len2;
      return clampS(t);
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function rampFrame() {
      const tx = Math.cos(ramp.th), ty = Math.sin(ramp.th);
      const nx = Math.sin(ramp.th), ny = -Math.cos(ramp.th);
      return { tx, ty, nx, ny };
    }

    function blockAt(t) {
      const p = posAt(t);
      const { tx, ty, nx, ny } = rampFrame();
      const cx = p.x + nx * (BH / 2);
      const cy = p.y + ny * (BH / 2);
      return { p, cx, cy, tx, ty, nx, ny };
    }

    function hitBlock(p) {
      const b = blockAt(s);
      const dx = p.x - b.cx, dy = p.y - b.cy;
      const localX = dx * b.tx + dy * b.ty;
      const localY = dx * b.nx + dy * b.ny;
      return Math.abs(localX) <= BW / 2 + 8 && Math.abs(localY) <= BH / 2 + 8;
    }

    function distToRamp(px, py) {
      const t = projectToRamp(px, py);
      const p = posAt(t);
      return Math.hypot(px - p.x, py - p.y);
    }

    function canDrag(p) {
      return hitBlock(p) || distToRamp(p.x, p.y) < 28;
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      computeRamp();
      s = clampS(s);
    }

    function update(dt) {
      if (paused || dragging) return;

      const gx = Gx(), ff = Ff();
      const maxS = sMax();
      if (s >= maxS - 0.001) { s = maxS; v = 0; sliding = false; return; }

      if (!sliding) {
        if (gx > ff) sliding = true;
        else { v = 0; return; }
      }

      const net = gx - ff;
      if (net <= 0) { v = 0; sliding = false; return; }

      const a = net / mass;
      v += a * dt * 22;
      s += v * dt * 0.09;

      if (s >= maxS) {
        s = maxS;
        v = 0;
        sliding = false;
        postState();
      }
    }

    function drawRamp() {
      ctx.fillStyle = "rgba(41,41,41,0.06)";
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 2.5;
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(ramp.apexX, ramp.apexY);
      ctx.lineTo(ramp.baseX, ramp.baseY);
      ctx.lineTo(ramp.footX, ramp.baseY);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ramp.footX - cssW * 0.06, ramp.baseY);
      ctx.lineTo(cssW * 0.92, ramp.baseY);
      ctx.stroke();
    }

    function drawBlock() {
      const { p } = blockAt(s);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(ramp.th);
      ctx.fillStyle = "#8043f0";
      ctx.fillRect(-BW / 2, -BH, BW, BH);
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-BW / 2, -BH, BW, BH);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);
      drawRamp();
      drawBlock();

      ctx.fillStyle = "rgba(41,41,41,0.45)";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Trage corpul pe plan — la eliberare alunecă spre bază", cssW * 0.5, cssH - 8);
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused) return;
      const p = ptr(e);
      if (!canDrag(p)) return;
      dragging = true;
      sliding = false;
      v = 0;
      pointerId = e.pointerId;
      s = projectToRamp(p.x, p.y);
      s = clampS(s);
      canvas.classList.add("dragging");
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      const p = ptr(e);
      s = projectToRamp(p.x, p.y);
      s = clampS(s);
    });

    canvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false;
      pointerId = null;
      v = 0;
      sliding = false;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(e.pointerId);
      postState();
    });

    canvas.addEventListener("pointercancel", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false;
      pointerId = null;
      canvas.classList.remove("dragging");
    });

    document.getElementById("theta").addEventListener("input", (e) => {
      theta = Number(e.target.value);
      document.getElementById("thetaVal").textContent = theta + "°";
      computeRamp();
      v = 0; sliding = false;
    });
    document.getElementById("m").addEventListener("input", (e) => {
      mass = Math.max(1, Number(e.target.value));
      document.getElementById("mVal").textContent = mass;
    });
    document.getElementById("mu").addEventListener("input", (e) => {
      mu = Number(e.target.value) / 100;
      document.getElementById("muVal").textContent = mu.toFixed(2);
    });

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas.parentElement);
    resize();
    postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
