<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planul înclinat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 75px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; }
    .row input[type=range] { flex: 1; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 24px; }
    .btn { min-height: 32px; padding: 0 10px; border: 1px solid #e0dce8; border-radius: 999px; background: #fff;
      font: 700 10px ui-sans-serif, system-ui, sans-serif; cursor: pointer; }
    .btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row"><label for="theta">θ</label><input id="theta" type="range" min="0" max="60" step="1" value="30"><span class="val" id="thetaVal">30°</span></div>
      <div class="row"><label for="m">m</label><input id="m" type="range" min="1" max="20" step="1" value="5"><span class="val" id="mVal">5</span></div>
      <div class="row"><label for="mu">μ</label><input id="mu" type="range" min="0" max="80" step="1" value="20"><span class="val" id="muVal">0.20</span></div>
      <button class="btn" type="button" id="pushBtn">Împinge sus</button>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const G = 9.81;

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let theta = 30, mass = 5, mu = 0.2, pushMode = false, Fpush = 0;
    let s = 0, v = 0;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Planul înclinat",
        text: "Gx = m·g·sinθ, Gy = m·g·cosθ.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      s = 0.2;
    }

    function rad() { return theta * Math.PI / 180; }
    function Gx() { return mass * G * Math.sin(rad()); }
    function Gy() { return mass * G * Math.cos(rad()); }
    function N() { return Gy(); }
    function Ff() { return mu * N(); }

    function netAlongRamp() {
      if (pushMode) return Fpush - Gx() - Ff();
      return Gx() - Ff();
    }

    function update(dt) {
      if (paused) return;
      const net = netAlongRamp();
      if (net > 0.01) {
        const a = net / mass;
        v += a * dt * 15;
        s += v * dt * 0.08;
        s = Math.max(0.05, Math.min(0.95, s));
      } else {
        v = 0;
      }
    }

    function rampPoints() {
      const x0 = cssW * 0.12, y0 = cssH * 0.75;
      const len = cssW * 0.72;
      const th = rad();
      return { x0, y0, x1: x0 + len * Math.cos(th), y1: y0 - len * Math.sin(th), th };
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);
      const r = rampPoints();

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(r.x0, r.y0);
      ctx.lineTo(r.x1, r.y1);
      ctx.stroke();

      const bx = r.x0 + s * (r.x1 - r.x0);
      const by = r.y0 + s * (r.y1 - r.y0);
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(-r.th);
      ctx.fillStyle = "#8043f0";
      ctx.fillRect(-18, -28, 36, 28);
      ctx.restore();

      ctx.fillStyle = "rgba(255,255,255,0.93)";
      ctx.strokeStyle = "#e8e8ec";
      ctx.beginPath();
      ctx.roundRect(10, 10, cssW < 360 ? cssW - 20 : 200, 88, 8);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#292929";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      const lines = [
        "G = " + (mass * G).toFixed(1) + " N",
        "Gx = " + Gx().toFixed(1) + " N  Gy = " + Gy().toFixed(1) + " N",
        "N = " + N().toFixed(1) + " N  Ff = " + Ff().toFixed(1) + " N",
        "a = " + (netAlongRamp() > 0 ? (netAlongRamp() / mass).toFixed(2) : "0") + " m/s²"
      ];
      lines.forEach((ln, i) => ctx.fillText(ln, 18, 28 + i * 14));

      if (pushMode) {
        ctx.fillStyle = "rgba(41,41,41,0.45)";
        ctx.fillText("F împingere = " + Fpush.toFixed(0) + " N (glisează pe canvas)", 10, cssH - 10);
      }
    }

    document.getElementById("theta").addEventListener("input", (e) => {
      theta = Number(e.target.value);
      document.getElementById("thetaVal").textContent = theta + "°";
      s = 0.2; v = 0;
    });
    document.getElementById("m").addEventListener("input", (e) => {
      mass = Math.max(1, Number(e.target.value));
      document.getElementById("mVal").textContent = mass;
    });
    document.getElementById("mu").addEventListener("input", (e) => {
      mu = Number(e.target.value) / 100;
      document.getElementById("muVal").textContent = mu.toFixed(2);
    });
    document.getElementById("pushBtn").addEventListener("click", () => {
      pushMode = !pushMode;
      document.getElementById("pushBtn").classList.toggle("active", pushMode);
      Fpush = pushMode ? 80 : 0;
      v = 0;
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!pushMode) return;
      const rect = canvas.getBoundingClientRect();
      Fpush = Math.max(0, Math.min(150, (e.clientX - rect.left) / cssW * 150));
    });

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
