<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greutatea pe planete</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 100px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; }
    select { border: 1px solid #e0dce8; border-radius: 999px; padding: 6px 10px; font: 600 10px ui-sans-serif, system-ui, sans-serif; }
    .row input[type=range] { flex: 1; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row">
        <label for="planet">Corp</label>
        <select id="planet">
          <option value="9.8">Pământ (9,8)</option>
          <option value="1.6">Luna (1,6)</option>
          <option value="3.7">Marte (3,7)</option>
          <option value="24.8">Jupiter (24,8)</option>
          <option value="274">Soare (274)</option>
        </select>
      </div>
      <div class="row"><label for="mass">m</label><input id="mass" type="range" min="1" max="200" step="1" value="70"><span class="val" id="massVal">70</span></div>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const planetEl = document.getElementById("planet");
    const massEl = document.getElementById("mass");

    const BODIES = [
      { name: "Pământ", g: 9.8, color: "#3498db" },
      { name: "Luna", g: 1.6, color: "#95a5a6" },
      { name: "Marte", g: 3.7, color: "#e74c3c" },
      { name: "Jupiter", g: 24.8, color: "#f39c12" },
      { name: "Soare", g: 274, color: "#f1c40f" }
    ];

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let g = 9.8, mass = 70, y = 0, vy = 0, t = 0, falling = true;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Greutatea pe planete",
        text: "G = m·g — cădere liberă pe corp ceresc.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      resetFall();
    }

    function resetFall() { y = cssH * 0.15; vy = 0; t = 0; falling = true; }

    function fallTime10() { return Math.sqrt(2 * 10 / g); }

    function update(dt) {
      if (paused || !falling) return;
      vy += g * dt * 55;
      y += vy * dt;
      t += dt;
      const ground = cssH * 0.72;
      if (y >= ground - 20) { y = ground - 20; vy = 0; falling = false; t = 0; setTimeout(resetFall, 800); }
    }

    function drawBody(x, ground, prog, color, label, small) {
      const h = small ? 14 : 22;
      const by = ground - 20 - prog;
      ctx.fillStyle = color;
      ctx.fillRect(x - h / 2, by - h, h, h);
      ctx.fillStyle = "rgba(41,41,41,0.55)";
      ctx.font = small ? "600 8px ui-sans-serif, system-ui, sans-serif" : "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label, x, ground + (small ? 12 : 16));
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);
      const ground = cssH * 0.72;

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cssW * 0.08, ground);
      ctx.lineTo(cssW * 0.92, ground);
      ctx.stroke();

      const prog = (y - cssH * 0.15) / (ground - 20 - cssH * 0.15);
      drawBody(cssW * 0.5, ground, Math.max(0, prog) * (ground - 20 - cssH * 0.15), "#8043f0", BODIES.find(b => b.g === g)?.name || "", false);

      const miniY = cssH * 0.82;
      const step = (cssW * 0.84) / BODIES.length;
      BODIES.forEach((b, i) => {
        const mx = cssW * 0.08 + step * (i + 0.5);
        const mp = Math.min(1, (t * b.g * 55) / (ground - cssH * 0.15) * 0.015);
        drawBody(mx, miniY, mp * 30, b.color, b.name, true);
      });

      ctx.fillStyle = "rgba(255,255,255,0.93)";
      ctx.strokeStyle = "#e8e8ec";
      ctx.beginPath();
      ctx.roundRect(10, 10, cssW < 360 ? cssW - 20 : 180, 68, 8);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#292929";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("g = " + g + " m/s²", 18, 28);
      ctx.fillText("G = " + (mass * g).toFixed(0) + " N", 18, 44);
      ctx.fillText("t(10 m) = " + fallTime10().toFixed(2) + " s", 18, 60);
    }

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    planetEl.addEventListener("change", () => { g = Number(planetEl.value); resetFall(); postState(); });
    massEl.addEventListener("input", () => { mass = Number(massEl.value); document.getElementById("massVal").textContent = mass; postState(); });

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
