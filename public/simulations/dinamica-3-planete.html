<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greutatea pe planete</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 90px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    select { border: 1px solid #e0dce8; border-radius: 999px; padding: 6px 10px; font: 600 10px ui-sans-serif, system-ui, sans-serif; }
    .row input[type=range] { flex: 1; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 28px; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row">
        <label for="planet">Corp</label>
        <select id="planet">
          <option value="9.8">Pământ (9,8)</option>
          <option value="1.6">Luna (1,6)</option>
          <option value="3.7">Marte (3,7)</option>
          <option value="24.8">Jupiter (24,8)</option>
          <option value="274">Soare (274)</option>
        </select>
      </div>
      <div class="row"><label for="g">g</label><input id="g" type="range" min="0.5" max="300" step="0.1" value="9.8"><span class="val" id="gVal">9.8</span></div>
      <div class="row"><label for="mass">m</label><input id="mass" type="range" min="1" max="200" step="1" value="70"><span class="val" id="massVal">70</span></div>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const planetEl = document.getElementById("planet");
    const gEl = document.getElementById("g");
    const massEl = document.getElementById("mass");

    const PRESETS = [
      { g: 9.8, value: "9.8" },
      { g: 1.6, value: "1.6" },
      { g: 3.7, value: "3.7" },
      { g: 24.8, value: "24.8" },
      { g: 274, value: "274" }
    ];

    const RADIUS = 22;
    const PX_PER_M = 18;

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let gVal = 9.8, mass = 70;
    let cx = 0, cy = 0, vy = 0;
    let dragging = false, falling = false, resting = false;
    let pointerId = null;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Greutatea pe planete",
        text: resting ? "G = m·g — corpul stă pe sol." : "Trage corpul și eliberează-l.",
        paused
      }, "*");
    }

    function groundY() { return cssH * 0.78; }

    function minCy() { return RADIUS + 12; }

    function maxCy() { return groundY() - RADIUS; }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = cssW * 0.5;
      cy = Math.min(cy || cssH * 0.28, maxCy());
      clampPos();
    }

    function clampPos() {
      cx = Math.max(RADIUS + 8, Math.min(cssW - RADIUS - 8, cx));
      cy = Math.max(minCy(), Math.min(maxCy(), cy));
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function hitBody(p) {
      return Math.hypot(p.x - cx, p.y - cy) <= RADIUS + 8;
    }

    function weightN() { return mass * gVal; }

    function syncPlanetSelect() {
      const match = PRESETS.find((p) => Math.abs(p.g - gVal) < 0.05);
      planetEl.value = match ? match.value : PRESETS[0].value;
    }

    function setG(val, fromPlanet) {
      gVal = Math.max(0.5, Math.min(300, val));
      gEl.value = gVal;
      document.getElementById("gVal").textContent = gVal.toFixed(1);
      if (fromPlanet) planetEl.value = String(gVal);
      else syncPlanetSelect();
    }

    function update(dt) {
      if (paused || dragging || resting) return;
      if (!falling) return;

      vy += gVal * PX_PER_M * dt;
      cy += vy * dt;

      if (cy >= maxCy()) {
        cy = maxCy();
        vy = 0;
        falling = false;
        resting = true;
        postState();
      }
    }

    function drawArrow(x0, y0, x1, y1, color) {
      const dx = x1 - x0, dy = y1 - y0;
      const len = Math.hypot(dx, dy) || 1;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
      const ux = dx / len, uy = dy / len;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 - ux * 9 - uy * 5, y1 - uy * 9 + ux * 5);
      ctx.lineTo(x1 - ux * 9 + uy * 5, y1 - uy * 9 - ux * 5);
      ctx.closePath();
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      const ground = groundY();

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(0, ground);
      ctx.lineTo(cssW, ground);
      ctx.stroke();

      ctx.fillStyle = "rgba(41,41,41,0.06)";
      ctx.fillRect(0, ground, cssW, cssH - ground);

      const W = weightN();
      const arrowLen = Math.min(90, 14 + W * 0.08);
      drawArrow(cx, cy, cx, cy + arrowLen, "#e74c3c");

      ctx.fillStyle = "#e74c3c";
      ctx.font = "700 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("G = " + W.toFixed(0) + " N", cx + 10, cy + arrowLen * 0.55);

      ctx.beginPath();
      ctx.arc(cx, cy, RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = "#8043f0";
      ctx.fill();
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 2;
      ctx.stroke();

      if (dragging) {
        ctx.strokeStyle = "rgba(128,67,240,0.35)";
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx, maxCy());
        ctx.stroke();
        ctx.setLineDash([]);
      }

      ctx.fillStyle = "rgba(41,41,41,0.45)";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Trage corpul deasupra solului", cssW * 0.5, cssH - 8);
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused) return;
      const p = ptr(e);
      if (!hitBody(p)) return;
      dragging = true;
      falling = false;
      resting = false;
      vy = 0;
      pointerId = e.pointerId;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      const p = ptr(e);
      cx = p.x;
      cy = p.y;
      clampPos();
    });

    canvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false;
      pointerId = null;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(e.pointerId);
      if (cy < maxCy() - 0.5) {
        falling = true;
        resting = false;
        vy = 0;
      } else {
        resting = true;
        falling = false;
        cy = maxCy();
      }
      postState();
    });

    canvas.addEventListener("pointercancel", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false;
      pointerId = null;
      canvas.classList.remove("dragging");
    });

    planetEl.addEventListener("change", () => {
      setG(Number(planetEl.value), true);
      postState();
    });

    gEl.addEventListener("input", () => {
      setG(Number(gEl.value), false);
      postState();
    });

    massEl.addEventListener("input", () => {
      mass = Math.max(1, Number(massEl.value));
      document.getElementById("massVal").textContent = mass;
      postState();
    });

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize();
    cy = maxCy();
    resting = true;
    postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
