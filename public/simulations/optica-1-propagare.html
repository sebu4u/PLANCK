<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propagarea rectilinie a luminii</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; --muted: #777777; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 120px; min-width: 0; }
    .row label { font: 600 10px/1.2 ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    .row input[type=range] { flex: 1; min-width: 60px; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 28px; }
    .btn { min-height: 32px; padding: 0 14px; border: 1px solid #e0dce8; border-radius: 999px; background: #fff;
      color: var(--text); font: 700 10px ui-sans-serif, system-ui, sans-serif; cursor: pointer; touch-action: manipulation; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row">
        <label for="srcSize">Sursă</label>
        <input id="srcSize" type="range" min="0" max="50" step="1" value="0">
        <span class="val" id="srcSizeVal">punct</span>
      </div>
      <button class="btn" type="button" id="resetBtn">Resetează</button>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const srcSizeEl = document.getElementById("srcSize");
    const srcSizeVal = document.getElementById("srcSizeVal");
    const resetBtn = document.getElementById("resetBtn");

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let sourceSize = 0;
    let obstacles = [];
    let drag = null;

    const SRC_X = 48;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Propagarea rectilinie",
        text: sourceSize < 2 ? "sursă punctiformă — umbră clară." : "sursă extinsă — apar penumbra și umbra.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function sourceSegment() {
      const cy = cssH * 0.5;
      return { x: SRC_X, y1: cy - sourceSize, y2: cy + sourceSize };
    }

    function segIntersect(x1, y1, x2, y2, x3, y3, x4, y4) {
      const d = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
      if (Math.abs(d) < 1e-9) return null;
      const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / d;
      const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / d;
      if (t >= 0 && t <= 1 && u >= 0 && u <= 1) return { x: x1 + t * (x2 - x1), y: y1 + t * (y2 - y1), t };
      return null;
    }

    function rayHitRect(ox, oy, dx, dy, r) {
      const edges = [
        [r.x, r.y, r.x + r.w, r.y], [r.x + r.w, r.y, r.x + r.w, r.y + r.h],
        [r.x + r.w, r.y + r.h, r.x, r.y + r.h], [r.x, r.y + r.h, r.x, r.y]
      ];
      let best = null;
      for (const [x1, y1, x2, y2] of edges) {
        const den = dx * (y2 - y1) - dy * (x2 - x1);
        if (Math.abs(den) < 1e-9) continue;
        const s = ((x1 - ox) * (y2 - y1) - (y1 - oy) * (x2 - x1)) / den;
        const u = ((x1 - ox) * dy - (y1 - oy) * dx) / den;
        if (s > 0.001 && u >= 0 && u <= 1 && (!best || s < best.s)) {
          best = { x: ox + s * dx, y: oy + s * dy, s };
        }
      }
      return best;
    }

    function castRay(sx, sy, angle) {
      const dx = Math.cos(angle), dy = Math.sin(angle);
      let minT = Math.min(
        (cssW - sx) / (dx || 1e-9), (cssH - sy) / (dy || 1e-9),
        sx / (-dx || 1e-9), sy / (-dy || 1e-9)
      );
      let hit = null;
      for (const o of obstacles) {
        const h = rayHitRect(sx, sy, dx, dy, o);
        if (h && h.s < minT) { minT = h.s; hit = h; }
      }
      const len = Math.min(minT, 1200);
      return { x1: sx, y1: sy, x2: sx + dx * len, y2: sy + dy * len, hit };
    }

    function lineThrough(x1, y1, x2, y2, extend) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.hypot(dx, dy) || 1;
      const ex = extend / len;
      return { x1, y1, x2: x1 + dx * ex, y2: y1 + dy * ex };
    }

    function shadowPolygons(src, obs) {
      const polys = [];
      const right = obs.x + obs.w;
      const corners = [
        { x: obs.x, y: obs.y }, { x: right, y: obs.y },
        { x: right, y: obs.y + obs.h }, { x: obs.x, y: obs.y + obs.h }
      ];

      const tangentsTop = corners.map(c => lineThrough(src.x, src.y1, c.x, c.y, 2000));
      const tangentsBot = corners.map(c => lineThrough(src.x, src.y2, c.x, c.y, 2000));

      const umbra = [
        { x: src.x, y: src.y1 }, { x: src.x, y: src.y2 },
        { x: right, y: obs.y + obs.h }, { x: right, y: obs.y }
      ];

      // penumbra outer: extreme tangents from source endpoints
      let minAngTop = Infinity, maxAngTop = -Infinity;
      let minAngBot = Infinity, maxAngBot = -Infinity;
      for (const c of corners) {
        const aT = Math.atan2(c.y - src.y1, c.x - src.x);
        const aB = Math.atan2(c.y - src.y2, c.x - src.x);
        minAngTop = Math.min(minAngTop, aT); maxAngTop = Math.max(maxAngTop, aT);
        minAngBot = Math.min(minAngBot, aB); maxAngBot = Math.max(maxAngBot, aB);
      }

      const far = 2000;
      const penOuter = [
        { x: src.x, y: src.y1 },
        { x: src.x + Math.cos(minAngTop) * far, y: src.y1 + Math.sin(minAngTop) * far },
        { x: src.x + Math.cos(maxAngBot) * far, y: src.y2 + Math.sin(maxAngBot) * far },
        { x: src.x, y: src.y2 }
      ];

      polys.push({ pts: penOuter, alpha: 0.14, label: "penumbra" });
      if (sourceSize > 1) {
        const umb = [
          { x: src.x, y: src.y1 },
          { x: src.x + Math.cos(maxAngTop) * far, y: src.y1 + Math.sin(maxAngTop) * far },
          { x: src.x + Math.cos(minAngBot) * far, y: src.y2 + Math.sin(minAngBot) * far },
          { x: src.x, y: src.y2 }
        ];
        polys.push({ pts: umb, alpha: 0.28, label: "umbra" });
      } else {
        const tip = corners.reduce((best, c) => {
          const ang = Math.atan2(c.y - src.y1, c.x - src.x);
          return !best || ang > best.ang ? { c, ang } : best;
        }, null);
        const tip2 = corners.reduce((best, c) => {
          const ang = Math.atan2(c.y - src.y1, c.x - src.x);
          return !best || ang < best.ang ? { c, ang } : best;
        }, null);
        const umbPt = [
          { x: src.x, y: src.y1 },
          { x: src.x + Math.cos(tip.ang) * far, y: src.y1 + Math.sin(tip.ang) * far },
          { x: src.x + Math.cos(tip2.ang) * far, y: src.y1 + Math.sin(tip2.ang) * far }
        ];
        polys.push({ pts: umbPt, alpha: 0.32, label: "umbra" });
      }
      return polys;
    }

    function fillPoly(pts, alpha) {
      if (pts.length < 3) return;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();
      ctx.fillStyle = `rgba(41,41,41,${alpha})`;
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      const src = sourceSegment();

      for (const o of obstacles) {
        for (const poly of shadowPolygons(src, o)) {
          ctx.save();
          ctx.beginPath();
          ctx.rect(o.x + o.w, 0, cssW - o.x - o.w, cssH);
          ctx.clip();
          fillPoly(poly.pts, poly.alpha);
          ctx.restore();
        }
      }

      const srcPts = sourceSize < 1 ? [src.y1] : [];
      if (sourceSize < 1) {
        srcPts.push((src.y1 + src.y2) / 2);
      } else {
        for (let i = 0; i <= 8; i++) srcPts.push(src.y1 + (src.y2 - src.y1) * i / 8);
      }

      const steps = cssW < 400 ? 48 : 72;
      ctx.lineWidth = 1;
      for (const sy of srcPts) {
        for (let i = 0; i < steps; i++) {
          const ang = -Math.PI * 0.85 + (Math.PI * 1.7) * (i / (steps - 1));
          const r = castRay(src.x, sy, ang);
          ctx.strokeStyle = r.hit ? "rgba(128,67,240,0.35)" : "rgba(128,67,240,0.55)";
          ctx.beginPath();
          ctx.moveTo(r.x1, r.y1);
          ctx.lineTo(r.x2, r.y2);
          ctx.stroke();
        }
      }

      ctx.fillStyle = "#ffd966";
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 1.5;
      if (sourceSize < 2) {
        ctx.beginPath();
        ctx.arc(src.x, (src.y1 + src.y2) / 2, 6, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(src.x, src.y1);
        ctx.lineTo(src.x, src.y2);
        ctx.lineWidth = 5;
        ctx.strokeStyle = "#ffd966";
        ctx.stroke();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "#292929";
        ctx.beginPath();
        ctx.arc(src.x, src.y1, 4, 0, Math.PI * 2);
        ctx.arc(src.x, src.y2, 4, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
      }

      for (const o of obstacles) {
        ctx.fillStyle = "rgba(41,41,41,0.85)";
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = "#292929";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(o.x, o.y, o.w, o.h);
      }

      if (drag) {
        const x = Math.min(drag.x0, drag.x1), y = Math.min(drag.y0, drag.y1);
        const w = Math.abs(drag.x1 - drag.x0), h = Math.abs(drag.y1 - drag.y0);
        ctx.strokeStyle = "#8043f0";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]);
      }

      ctx.fillStyle = "#292929";
      ctx.font = "700 11px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Trage pe canvas pentru obstacol", 10, cssH - 10);
      if (sourceSize > 2) {
        ctx.fillStyle = "rgba(41,41,41,0.55)";
        ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
        ctx.fillText("Penumbra (deschis) · Umbra (închis)", 10, cssH - 26);
      }
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused || e.clientX - canvas.getBoundingClientRect().left < SRC_X + 20) return;
      const p = ptr(e);
      drag = { x0: p.x, y0: p.y, x1: p.x, y1: p.y, id: e.pointerId };
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener("pointermove", (e) => {
      if (!drag || drag.id !== e.pointerId) return;
      const p = ptr(e);
      drag.x1 = p.x; drag.y1 = p.y;
    });
    canvas.addEventListener("pointerup", (e) => {
      if (!drag || drag.id !== e.pointerId) return;
      const x = Math.min(drag.x0, drag.x1), y = Math.min(drag.y0, drag.y1);
      const w = Math.abs(drag.x1 - drag.x0), h = Math.abs(drag.y1 - drag.y0);
      if (w > 12 && h > 12 && x > SRC_X + 16) obstacles.push({ x, y, w, h });
      drag = null;
      canvas.releasePointerCapture(e.pointerId);
      postState();
    });

    srcSizeEl.addEventListener("input", () => {
      sourceSize = Number(srcSizeEl.value);
      srcSizeVal.textContent = sourceSize < 2 ? "punct" : sourceSize + " px";
      postState();
    });
    resetBtn.addEventListener("click", () => { obstacles = []; postState(); });

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") {
        paused = Boolean(d.paused); postState();
      }
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    (function loop() { draw(); requestAnimationFrame(loop); })();
  </script>
</body>
</html>
