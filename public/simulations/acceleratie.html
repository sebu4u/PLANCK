<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accelerația</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #292929;
      --line: #e8e8ec;
      --accent: #8043f0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { display: grid; place-items: stretch; }

    .sim {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      padding: 2px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .tab {
      min-height: 34px;
      border: 1px solid #e0dce8;
      border-radius: 999px;
      background: #ffffff;
      color: var(--text);
      font: 700 11px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
      touch-action: manipulation;
    }

    .tab.active {
      border-color: var(--text);
      background: var(--text);
      color: #ffffff;
    }

    .stage {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (min-width: 420px) {
      .sim { gap: 12px; }
      .tabs { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .tab { min-height: 32px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <main class="sim">
    <nav class="tabs" aria-label="Tipuri de accelerație">
      <button class="tab active" type="button" data-type="zero">a = 0</button>
      <button class="tab" type="button" data-type="positive">Accelerează</button>
      <button class="tab" type="button" data-type="negative">Frânează</button>
      <button class="tab" type="button" data-type="opposite">Sens opus</button>
    </nav>

    <section class="stage" aria-label="Simulare accelerație">
      <canvas id="canvas"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    const TYPES = {
      zero: {
        name: "Accelerație zero",
        text: "viteza rămâne constantă.",
        color: "#292929",
        a: 0,
        initialV: 0.24
      },
      positive: {
        name: "Accelerație pozitivă",
        text: "viteza crește în timp.",
        color: "#8043f0",
        a: 0.055,
        initialV: 0.08
      },
      negative: {
        name: "Accelerație negativă",
        text: "viteza scade până aproape de oprire.",
        color: "#292929",
        a: -0.045,
        initialV: 0.38
      },
      opposite: {
        name: "Accelerație opusă",
        text: "accelerația indică în sens opus vitezei.",
        color: "#8043f0",
        a: -0.06,
        initialV: 0.36
      }
    };

    let type = "zero";
    let time = 0;
    let paused = false;
    let trail = [];
    let cssW = 0;
    let cssH = 0;
    let dpr = 1;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: TYPES[type].name,
        text: TYPES[type].text,
        paused
      }, "*");
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      cssW = Math.max(1, rect.width);
      cssH = Math.max(1, rect.height);
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      trail = [];
    }

    function stateAt(t) {
      const config = TYPES[type];
      const cycle = type === "zero" ? t % 4 : t % 5;
      const v = Math.max(0.05, config.initialV + config.a * cycle);
      const progress = type === "zero"
        ? (cycle * config.initialV) % 1
        : (config.initialV * cycle + 0.5 * config.a * cycle * cycle) % 1;
      const margin = Math.max(24, cssW * 0.09);
      const span = cssW - margin * 2;
      return {
        x: margin + Math.max(0, progress) * span,
        y: cssH * 0.56,
        v
      };
    }

    function drawGrid() {
      const y = cssH * 0.56;
      ctx.strokeStyle = "rgba(41,41,41,0.08)";
      ctx.lineWidth = 1;
      for (let x = 24; x < cssW; x += cssW < 360 ? 34 : 42) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, cssH);
        ctx.stroke();
      }
      ctx.strokeStyle = "rgba(41,41,41,0.24)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(16, y);
      ctx.lineTo(cssW - 16, y);
      ctx.stroke();
    }

    function drawArrow(x, y, length, color, label, direction) {
      const endX = x + length * direction;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(endX, y);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(endX, y);
      ctx.lineTo(endX - 8 * direction, y - 5);
      ctx.lineTo(endX - 8 * direction, y + 5);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();

      ctx.fillStyle = color;
      ctx.font = "700 10px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText(label, x, y - 8);
    }

    function drawTrail() {
      const max = cssW < 360 ? 34 : 44;
      while (trail.length > max) trail.shift();
      if (trail.length < 2) return;

      ctx.strokeStyle = type === "positive" || type === "opposite" ? "rgba(128,67,240,0.32)" : "rgba(41,41,41,0.24)";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.beginPath();
      trail.forEach((point, index) => {
        if (index === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();
    }

    function drawBody(state) {
      const color = TYPES[type].color;
      const velocityLength = Math.min(cssW * 0.22, 24 + state.v * 120);
      const acceleration = TYPES[type].a;
      const accelDirection = acceleration < 0 ? -1 : 1;
      const accelLength = acceleration === 0 ? 0 : Math.min(cssW * 0.17, 36 + Math.abs(acceleration) * 420);

      drawArrow(state.x + 8, state.y - 30, velocityLength, color, "v", 1);
      if (accelLength > 0) {
        drawArrow(state.x, state.y + 30, accelLength, "#8043f0", "a", accelDirection);
      } else {
        ctx.fillStyle = "rgba(41,41,41,0.38)";
        ctx.font = "700 11px ui-sans-serif, system-ui, sans-serif";
        ctx.fillText("a = 0", state.x - 10, state.y + 36);
      }

      ctx.beginPath();
      ctx.arc(state.x, state.y, 14, 0, Math.PI * 2);
      ctx.fillStyle = color === "#8043f0" ? "rgba(128,67,240,0.16)" : "rgba(41,41,41,0.12)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(state.x, state.y, 7, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function frame() {
      if (!paused) time += 0.016;

      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cssW, cssH);
      drawGrid();

      const state = stateAt(time);
      if (!paused || trail.length === 0) trail.push({ x: state.x, y: state.y });
      drawTrail();
      drawBody(state);

      requestAnimationFrame(frame);
    }

    function setType(nextType) {
      type = nextType;
      time = 0;
      trail = [];
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.type === type));
      postState();
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setType(tab.dataset.type));
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type !== "learning-path-simulation-set-paused" && data.type !== "trajectory-simulation-set-paused") return;
      paused = Boolean(data.paused);
      postState();
    });

    new ResizeObserver(resize).observe(canvas);
    resize();
    postState();
    frame();
  </script>
</body>
</html>
