<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dinamometrul</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #292929;
      --line: #e8e8ec;
      --accent: #8043f0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { display: grid; place-items: stretch; }

    .sim {
      width: 100%;
      height: 100%;
      padding: 2px;
    }

    .stage {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
    }

    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="sim">
    <section class="stage" aria-label="Simulare dinamometru">
      <canvas id="canvas"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const MAX_FORCE = 10;
    const SPRING_K = 320;
    const DAMPING = 11;
    const HANDLE_R = 18;

    let cssW = 0;
    let cssH = 0;
    let dpr = 1;

    let anchorY = 0;
    let restY = 0;
    let maxExt = 0;
    let cx = 0;

    let handleY = 0;
    let velocity = 0;
    let dragging = false;
    let dragOffsetY = 0;
    let pointerId = null;
    let paused = false;
    let hoverHandle = false;

    let lastTime = performance.now();

    function layout() {
      cx = cssW * 0.5;
      anchorY = cssH * 0.12;
      restY = anchorY + 72;
      maxExt = Math.min(cssH * 0.48, 200);
    }

    function extension() {
      return Math.max(0, handleY - restY);
    }

    function forceN() {
      if (maxExt <= 0) return 0;
      return (extension() / maxExt) * MAX_FORCE;
    }

    function postState() {
      const f = forceN();
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Dinamometrul",
        text: dragging
          ? "tragi de arc — F = " + f.toFixed(1) + " N."
          : f < 0.05
            ? "trage în jos de cârlig ca să măsori forța."
            : "F = " + f.toFixed(1) + " N (F = k · Δl).",
        paused
      }, "*");
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      cssW = Math.max(1, rect.width);
      cssH = Math.max(1, rect.height);
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const prevExt = maxExt > 0 ? Math.max(0, handleY - restY) : 0;
      layout();
      handleY = restY + Math.min(maxExt, prevExt);
    }

    function pointerPos(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function hitHandle(x, y) {
      const dx = x - cx;
      const dy = y - handleY;
      return dx * dx + dy * dy <= (HANDLE_R + 10) * (HANDLE_R + 10);
    }

    function clampHandle(y) {
      return Math.max(restY, Math.min(restY + maxExt, y));
    }

    function drawSupport() {
      ctx.strokeStyle = "rgba(41,41,41,0.32)";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(cx - 36, anchorY - 14);
      ctx.lineTo(cx + 36, anchorY - 14);
      ctx.stroke();

      ctx.fillStyle = "rgba(41,41,41,0.12)";
      ctx.fillRect(cx - 5, anchorY - 14, 10, 12);

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, anchorY - 2);
      ctx.lineTo(cx, anchorY + 8);
      ctx.stroke();
    }

    function drawSpring(y1, y2) {
      const coils = 10;
      const amp = cssW < 360 ? 8 : 10;
      const len = Math.max(12, y2 - y1);
      const step = len / coils;
      const stretch = extension() / Math.max(1, maxExt);
      const color = stretch > 0.02 ? "#8043f0" : "#292929";

      ctx.strokeStyle = color;
      ctx.lineWidth = 2.4;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(cx, y1);

      for (let i = 0; i < coils; i++) {
        const sy = y1 + step * i;
        const dir = i % 2 === 0 ? 1 : -1;
        ctx.lineTo(cx + amp * dir, sy + step * 0.5);
        ctx.lineTo(cx, y1 + step * (i + 1));
      }
      ctx.stroke();
    }

    function drawHandle() {
      const stretch = extension() / Math.max(1, maxExt);
      const color = stretch > 0.02 ? "#8043f0" : "#292929";
      const active = dragging || hoverHandle;

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, handleY - 6);
      ctx.lineTo(cx, handleY + 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, handleY + 8, 7, Math.PI, 0);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, handleY + 20, HANDLE_R, 0, Math.PI * 2);
      ctx.fillStyle = active
        ? "rgba(128,67,240,0.18)"
        : stretch > 0.02
          ? "rgba(128,67,240,0.12)"
          : "rgba(41,41,41,0.08)";
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = active ? 2.6 : 2;
      ctx.stroke();

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(cx + i * 7, handleY + 14);
        ctx.lineTo(cx + i * 7, handleY + 26);
        ctx.stroke();
      }
    }

    function drawHint() {
      if (dragging || extension() > 2) return;

      ctx.fillStyle = "rgba(41,41,41,0.38)";
      ctx.font = "600 11px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("↓ trage în jos", cx, handleY + 52);
    }

    function drawReadout() {
      const f = forceN();
      const dlCm = (extension() / Math.max(1, maxExt)) * 5;
      const y = Math.min(cssH - 28, handleY + 68);

      ctx.textAlign = "center";

      ctx.fillStyle = f > 0.05 ? "#8043f0" : "#292929";
      ctx.font = "700 18px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("F = " + f.toFixed(1) + " N", cx, y);

      ctx.fillStyle = "rgba(41,41,41,0.55)";
      ctx.font = "600 11px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("Δl = " + dlCm.toFixed(1) + " cm", cx, y + 18);
    }

    function drawScale() {
      const scaleX = cx + (cssW < 360 ? 56 : 68);
      const top = restY;
      const h = maxExt;

      ctx.strokeStyle = "rgba(41,41,41,0.16)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(scaleX, top);
      ctx.lineTo(scaleX, top + h);
      ctx.stroke();

      ctx.fillStyle = "rgba(41,41,41,0.45)";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";

      for (let n = 0; n <= MAX_FORCE; n += 2) {
        const y = top + (n / MAX_FORCE) * h;
        ctx.beginPath();
        ctx.moveTo(scaleX - 6, y);
        ctx.lineTo(scaleX, y);
        ctx.strokeStyle = "rgba(41,41,41,0.28)";
        ctx.stroke();
        ctx.fillText(n + " N", scaleX + 5, y + 3);
      }

      const fy = top + (forceN() / MAX_FORCE) * h;
      ctx.beginPath();
      ctx.moveTo(scaleX - 14, fy);
      ctx.lineTo(scaleX - 2, fy);
      ctx.strokeStyle = forceN() > 0.05 ? "#8043f0" : "#292929";
      ctx.lineWidth = 2.2;
      ctx.stroke();
    }

    function updatePhysics(dt) {
      if (dragging || paused) return;

      const stretch = handleY - restY;
      const accel = (-SPRING_K * stretch - DAMPING * velocity);
      velocity += accel * dt;
      handleY += velocity * dt;

      if (handleY < restY) {
        handleY = restY;
        velocity = -velocity * 0.35;
      } else if (handleY > restY + maxExt) {
        handleY = restY + maxExt;
        velocity = -velocity * 0.35;
      }

      if (Math.abs(stretch) < 0.3 && Math.abs(velocity) < 0.5) {
        handleY = restY;
        velocity = 0;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cssW, cssH);

      drawSupport();
      drawScale();
      drawSpring(anchorY + 10, handleY - 6);
      drawHandle();
      drawHint();
      drawReadout();
    }

    function frame(now) {
      const dt = Math.min(0.032, (now - lastTime) / 1000);
      lastTime = now;

      updatePhysics(dt);
      draw();

      requestAnimationFrame(frame);
    }

    function startDrag(event) {
      if (paused) return;
      const pos = pointerPos(event);
      if (!hitHandle(pos.x, pos.y)) return;

      dragging = true;
      pointerId = event.pointerId;
      dragOffsetY = pos.y - handleY;
      velocity = 0;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(event.pointerId);
      postState();
    }

    function moveDrag(event) {
      const pos = pointerPos(event);

      if (!dragging) {
        const wasHover = hoverHandle;
        hoverHandle = hitHandle(pos.x, pos.y);
        if (wasHover !== hoverHandle) canvas.style.cursor = hoverHandle ? "grab" : "default";
        return;
      }

      if (event.pointerId !== pointerId) return;
      handleY = clampHandle(pos.y - dragOffsetY);
      velocity = 0;
      postState();
    }

    function endDrag(event) {
      if (!dragging || event.pointerId !== pointerId) return;

      dragging = false;
      pointerId = null;
      canvas.classList.remove("dragging");

      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }

      postState();
    }

    canvas.addEventListener("pointerdown", startDrag);
    canvas.addEventListener("pointermove", moveDrag);
    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);
    canvas.addEventListener("lostpointercapture", () => {
      dragging = false;
      pointerId = null;
      canvas.classList.remove("dragging");
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type !== "learning-path-simulation-set-paused" && data.type !== "trajectory-simulation-set-paused") return;
      paused = Boolean(data.paused);
      if (paused) {
        dragging = false;
        canvas.classList.remove("dragging");
      }
      postState();
    });

    new ResizeObserver(resize).observe(canvas);
    resize();
    postState();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
