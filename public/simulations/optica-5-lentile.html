<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lentile subțiri</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 110px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    .row input[type=range] { flex: 1; min-width: 50px; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 36px; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row">
        <label for="f">f</label>
        <input id="f" type="range" min="-200" max="200" step="5" value="50">
        <span class="val" id="fVal">50</span>
      </div>
      <div class="row">
        <label for="h">h₀</label>
        <input id="h" type="range" min="20" max="80" step="2" value="50">
        <span class="val" id="hVal">50</span>
      </div>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const fEl = document.getElementById("f");
    const hEl = document.getElementById("h");

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let focal = 50, objH = 50, d0 = 180;
    let dragging = false, pointerId = null;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Lentile subțiri",
        text: "trage obiectul — 1/f = 1/d₀ + 1/dᵢ.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function lensX() { return cssW * 0.5; }
    function axisY() { return cssH * 0.52; }

    function imageCalc() {
      const f = focal;
      const d0v = d0;
      if (Math.abs(f) < 1) return { di: Infinity, m: 0, real: false, upright: true };
      const invDi = 1 / f - 1 / d0v;
      if (Math.abs(invDi) < 1e-6) return { di: Infinity, m: 0, real: false, upright: false };
      const di = 1 / invDi;
      const m = -di / d0v;
      return { di, m, real: di > 0, upright: m > 0 };
    }

    function lineIntersect(x1, y1, x2, y2, x3, y3, x4, y4) {
      const d = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
      if (Math.abs(d) < 1e-9) return null;
      const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / d;
      return { x: x1 + t * (x2 - x1), y: y1 + t * (y2 - y1), t };
    }

    function clipX(x) { return Math.max(8, Math.min(cssW - 8, x)); }
    function clipY(y) { return Math.max(8, Math.min(cssH - 8, y)); }

    function drawRay(x1, y1, x2, y2, color, dashed) {
      x2 = clipX(x2); y2 = clipY(y2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.8;
      ctx.setLineDash(dashed ? [5, 4] : []);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawArrow(x, yBase, yTip, color, alpha) {
      ctx.globalAlpha = alpha ?? 1;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x, yBase);
      ctx.lineTo(x, yTip);
      ctx.stroke();
      const dir = yTip < yBase ? -1 : 1;
      ctx.beginPath();
      ctx.moveTo(x, yTip);
      ctx.lineTo(x - 6, yTip - dir * 10);
      ctx.lineTo(x + 6, yTip - dir * 10);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      const L = lensX(), cy = axisY();
      const ox = L - d0;
      const tipY = cy - objH;
      const f = focal;
      const img = imageCalc();

      ctx.setLineDash([6, 5]);
      ctx.strokeStyle = "rgba(41,41,41,0.25)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, cy);
      ctx.lineTo(cssW, cy);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle = "#8043f0";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(L, cy, 6, 70, 0, 0, Math.PI * 2);
      ctx.stroke();

      if (Math.abs(f) > 5) {
        ctx.fillStyle = "#292929";
        ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("F", L - f, cy + 14);
        ctx.beginPath();
        ctx.arc(L - f, cy, 3, 0, Math.PI * 2);
        ctx.fill();
        if (f > 0) {
          ctx.fillText("F'", L + f, cy + 14);
          ctx.beginPath();
          ctx.arc(L + f, cy, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      const yLens = tipY;
      const Fleft = L - f, Fright = L + f;

      drawRay(ox, tipY, L, yLens, "#8043f0", false);
      if (Math.abs(f) > 5) {
        const slope = (cy - yLens) / (Fright - L);
        const endX = f > 0 ? cssW - 10 : L + 120;
        const endY = yLens + slope * (endX - L);
        drawRay(L, yLens, endX, endY, "#8043f0", f < 0);

        if (f < 0) {
          const extX = L - 80;
          const extY = yLens + slope * (extX - L);
          drawRay(L, yLens, extX, extY, "#8043f0", true);
        }
      }

      drawRay(ox, tipY, cssW - 10, cy + (tipY - cy) * (cssW - 10 - ox) / (L - ox), "#292929", false);

      if (Math.abs(f) > 5) {
        const hit = lineIntersect(ox, tipY, Fleft, cy, L, cy - 100, L, cy + 100);
        const yL2 = hit ? hit.y : tipY;
        drawRay(ox, tipY, L, yL2, "#292929", false);
        drawRay(L, yL2, cssW - 10, yL2, "#292929", f < 0);
        if (f < 0) drawRay(L, yL2, L - 100, yL2 + (yL2 - cy) * (L - 100 - L) / (cssW - L), "#292929", true);
      }

      let imgX = L + img.di, imgTipY = cy - objH * img.m;
      if (!isFinite(img.di)) { imgX = L + 200; imgTipY = cy; }

      if (isFinite(img.di)) {
        const alpha = img.real ? 1 : 0.55;
        drawArrow(imgX, cy, imgTipY, img.real ? "#8043f0" : "#777777", alpha);
      }

      drawArrow(ox, cy, tipY, "#292929", 1);

      ctx.fillStyle = "rgba(41,41,41,0.45)";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Trage obiectul pe axă", 10, cssH - 10);
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused) return;
      const p = ptr(e);
      const ox = lensX() - d0;
      if (Math.hypot(p.x - ox, p.y - (axisY() - objH / 2)) < 40) {
        dragging = true; pointerId = e.pointerId;
        canvas.classList.add("dragging");
        canvas.setPointerCapture(e.pointerId);
      }
    });
    canvas.addEventListener("pointermove", (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      const p = ptr(e);
      d0 = Math.max(40, Math.min(lensX() - 30, lensX() - p.x));
    });
    canvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false; pointerId = null;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(e.pointerId);
    });

    fEl.addEventListener("input", () => {
      focal = Number(fEl.value);
      if (focal === 0) focal = 5;
      document.getElementById("fVal").textContent = focal;
      postState();
    });
    hEl.addEventListener("input", () => {
      objH = Number(hEl.value);
      document.getElementById("hVal").textContent = objH;
      postState();
    });

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    (function loop() { draw(); requestAnimationFrame(loop); })();
  </script>
</body>
</html>
