<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refracția luminii</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 100px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    select { border: 1px solid #e0dce8; border-radius: 999px; padding: 6px 10px; font: 600 10px ui-sans-serif, system-ui, sans-serif; background: #fff; color: var(--text); }
    .btn { min-height: 32px; padding: 0 12px; border: 1px solid #e0dce8; border-radius: 999px; background: #fff;
      font: 700 10px ui-sans-serif, system-ui, sans-serif; cursor: pointer; touch-action: manipulation; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row">
        <label for="medium">Mediul 2</label>
        <select id="medium">
          <option value="1.33">Apă (n=1,33)</option>
          <option value="1.50" selected>Sticlă (n=1,50)</option>
          <option value="2.42">Diamant (n=2,42)</option>
        </select>
      </div>
      <button class="btn" type="button" id="swapBtn">Inversează medii</button>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const mediumEl = document.getElementById("medium");
    const swapBtn = document.getElementById("swapBtn");

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let n1 = 1.0, n2 = 1.5;
    let incidenceDeg = 35;
    let dragging = false, pointerId = null;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Refracția luminii",
        text: "n₁·sin(i) = n₂·sin(r) — trage sursa pentru unghi.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function interfaceY() { return cssH * 0.5; }
    function hitX() { return cssW * 0.5; }

    function deg2rad(d) { return d * Math.PI / 180; }
    function rad2deg(r) { return r * 180 / Math.PI; }

    function snellRefract(nA, nB, iRad) {
      const sinR = (nA / nB) * Math.sin(iRad);
      if (Math.abs(sinR) > 1) return null;
      return Math.asin(sinR);
    }

    function trace() {
      const hx = hitX(), hy = interfaceY();
      const iRad = deg2rad(incidenceDeg);
      const len = Math.min(cssW, cssH) * 0.42;

      // Direcție de sus în jos, din mediul 1 spre interfață
      const incDir = { x: Math.sin(iRad), y: Math.cos(iRad) };
      const sx = hx - incDir.x * len;
      const sy = hy - incDir.y * len;

      const rRefr = snellRefract(n1, n2, iRad);
      const tir = rRefr === null;
      let refrDir = null, rDeg = 0;
      if (!tir) {
        rDeg = rad2deg(rRefr);
        refrDir = { x: Math.sin(rRefr), y: Math.cos(rRefr) };
      }

      return { sx, sy, hx, hy, incDir, refrDir, iDeg: incidenceDeg, rDeg, tir };
    }

    function clipRay(x0, y0, dx, dy, maxLen) {
      let tMax = maxLen;
      if (dx > 0) tMax = Math.min(tMax, (cssW - 4 - x0) / dx);
      if (dx < 0) tMax = Math.min(tMax, (x0 - 4) / -dx);
      if (dy > 0) tMax = Math.min(tMax, (cssH - 4 - y0) / dy);
      if (dy < 0) tMax = Math.min(tMax, (y0 - 4) / -dy);
      return { x: x0 + dx * tMax, y: y0 + dy * tMax };
    }

    function drawRay(x0, y0, dx, dy, color, width, alpha) {
      const end = clipRay(x0, y0, dx, dy, 600);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function drawAngleArc(cx, cy, fromAng, toAng, radius, color) {
      let diff = toAng - fromAng;
      while (diff <= -Math.PI) diff += 2 * Math.PI;
      while (diff > Math.PI) diff -= 2 * Math.PI;
      const ccw = diff < 0;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, fromAng, fromAng + diff, ccw);
      ctx.stroke();
      return fromAng + diff / 2;
    }

    function drawAngleLabel(cx, cy, bisectAng, radius, text, color) {
      const lx = cx + Math.cos(bisectAng) * (radius + 14);
      const ly = cy + Math.sin(bisectAng) * (radius + 14);
      ctx.fillStyle = color;
      ctx.font = "700 11px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, lx, ly);
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      const iy = interfaceY();

      ctx.fillStyle = "rgba(128,67,240,0.04)";
      ctx.fillRect(0, 0, cssW, iy);
      ctx.fillStyle = "rgba(41,41,41,0.04)";
      ctx.fillRect(0, iy, cssW, cssH - iy);

      ctx.strokeStyle = "#8043f0";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, iy);
      ctx.lineTo(cssW, iy);
      ctx.stroke();

      ctx.fillStyle = "rgba(41,41,41,0.45)";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Aer n=" + n1.toFixed(2), 8, iy - 8);
      ctx.fillText("Mediu 2 n=" + n2.toFixed(2), 8, iy + 16);

      const ray = trace();

      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = "rgba(41,41,41,0.4)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(ray.hx, ray.hy);
      ctx.lineTo(ray.hx, ray.hy - 40);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.strokeStyle = "#8043f0";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(ray.sx, ray.sy);
      ctx.lineTo(ray.hx, ray.hy);
      ctx.stroke();

      if (!ray.tir && ray.refrDir) {
        drawRay(ray.hx, ray.hy, ray.refrDir.x, ray.refrDir.y, "#8043f0", 2.5, 1);
      }

      const normalUp = -Math.PI / 2;
      const incomingAng = Math.atan2(-ray.incDir.y, -ray.incDir.x);
      const iBisect = drawAngleArc(ray.hx, ray.hy, incomingAng, normalUp, 24, "#292929");
      drawAngleLabel(ray.hx, ray.hy, iBisect, 24, "i = " + ray.iDeg.toFixed(0) + "°", "#292929");

      if (!ray.tir) {
        const normalDown = Math.PI / 2;
        const refrAng = Math.atan2(ray.refrDir.y, ray.refrDir.x);
        const rBisect = drawAngleArc(ray.hx, ray.hy, normalDown, refrAng, 34, "#8043f0");
        drawAngleLabel(ray.hx, ray.hy, rBisect, 34, "r = " + ray.rDeg.toFixed(0) + "°", "#8043f0");
      }

      ctx.fillStyle = "#8043f0";
      ctx.beginPath();
      ctx.arc(ray.sx, ray.sy, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(41,41,41,0.45)";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Trage sursa de sus (mediul 1)", 10, cssH - 10);
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function setIncidenceFromPoint(x, y) {
      const hx = hitX(), hy = interfaceY();
      const dx = hx - x;
      const dy = hy - y;
      if (dy <= 8) return;
      incidenceDeg = Math.max(0.5, Math.min(89.9, rad2deg(Math.atan2(dx, dy))));
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused) return;
      dragging = true; pointerId = e.pointerId;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(e.pointerId);
      const p = ptr(e);
      if (p.y < interfaceY() - 8) setIncidenceFromPoint(p.x, p.y);
    });
    canvas.addEventListener("pointermove", (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      const p = ptr(e);
      if (p.y < interfaceY() - 8) setIncidenceFromPoint(p.x, p.y);
    });
    canvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false; pointerId = null;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(e.pointerId);
    });

    mediumEl.addEventListener("change", () => { n2 = Number(mediumEl.value); postState(); });
    swapBtn.addEventListener("click", () => {
      const t = n1; n1 = n2; n2 = t;
      const opts = ["1.33", "1.50", "2.42"];
      const match = opts.find((o) => Math.abs(Number(o) - n2) < 0.01);
      mediumEl.value = match || "1.50";
      if (!match) n2 = Number(mediumEl.value);
      postState();
    });

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") {
        paused = Boolean(d.paused); postState();
      }
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    (function loop() { draw(); requestAnimationFrame(loop); })();
  </script>
</body>
</html>
