<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conservarea energiei mecanice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 110px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; }
    .row input[type=range] { flex: 1; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); }
    .btn { min-height: 32px; padding: 0 12px; border: 1px solid #e0dce8; border-radius: 999px; background: #fff;
      font: 700 10px ui-sans-serif, system-ui, sans-serif; cursor: pointer; touch-action: manipulation; }
    .btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row"><label for="h0">h₀</label><input id="h0" type="range" min="0.5" max="5" step="0.1" value="3"><span class="val" id="h0Val">3.0 m</span></div>
      <button class="btn" type="button" id="fricBtn">Frecare</button>
      <button class="btn" type="button" id="resetBtn">Reset</button>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const G = 9.81;
    const MASS = 1;

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let hStart = 3, friction = false;
    let arcPos = 0, dir = 1, Emec = 0;
    let track = [];

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Conservarea energiei",
        text: "Ep + Ec = Emec (constant fără frecare).",
        paused
      }, "*");
    }

    function trackY(x) {
      const t = x / cssW;
      return cssH * 0.62 + Math.sin(t * Math.PI * 2.1) * cssH * 0.11 + Math.sin(t * Math.PI * 4.5) * cssH * 0.035;
    }

    function buildTrack() {
      track = [];
      let s = 0;
      let prevX = 0, prevY = trackY(0);
      const groundRef = cssH * 0.86;
      const mPerPx = 5 / (cssH * 0.22);

      for (let x = 0; x <= cssW; x += 3) {
        const y = trackY(x);
        if (x > 0) s += Math.hypot(x - prevX, y - prevY);
        const h = Math.max(0, (groundRef - y) * mPerPx);
        track.push({ x, y, s, h });
        prevX = x; prevY = y;
      }
    }

    function sampleAt(sPos) {
      if (!track.length) return { x: 0, y: 0, h: 0, tx: 1, ty: 0 };
      sPos = Math.max(0, Math.min(track[track.length - 1].s, sPos));
      let i = 0;
      while (i < track.length - 1 && track[i + 1].s < sPos) i++;
      const a = track[i], b = track[Math.min(i + 1, track.length - 1)];
      const t = b.s > a.s ? (sPos - a.s) / (b.s - a.s) : 0;
      const x = a.x + (b.x - a.x) * t;
      const y = a.y + (b.y - a.y) * t;
      const h = a.h + (b.h - a.h) * t;
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      return { x, y, h, tx: dx / len, ty: dy / len };
    }

    function reset() {
      dir = 1;
      Emec = MASS * G * hStart;
      arcPos = 0;
      if (track.length) {
        let best = 0, bestDiff = Infinity;
        for (const p of track) {
          if (p.x > cssW * 0.35) break;
          const diff = Math.abs(p.h - hStart);
          if (diff < bestDiff) { bestDiff = diff; best = p.s; }
        }
        arcPos = best;
      }
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildTrack();
      reset();
    }

    function update(dt) {
      if (paused || !track.length) return;
      const pt = sampleAt(arcPos);
      const Ep = MASS * G * pt.h;
      let Ec = Math.max(0, Emec - Ep);
      let v = Ec > 1e-4 ? Math.sqrt(2 * Ec / MASS) : 0;

      if (friction && v > 0.01) {
        const loss = 12 * v * dt;
        Emec = Math.max(Ep, Emec - loss);
        Ec = Math.max(0, Emec - Ep);
        v = Ec > 1e-4 ? Math.sqrt(2 * Ec / MASS) : 0;
      }

      if (v < 0.05) {
        const ahead = sampleAt(arcPos + 4 * dir);
        const behind = sampleAt(arcPos - 4 * dir);
        if (ahead.h > pt.h + 0.02 && behind.h <= pt.h) dir *= -1;
        else if (ahead.h >= pt.h && behind.h < pt.h - 0.02) { /* keep */ }
        else if (v < 0.02) return;
      }

      const next = arcPos + dir * v * dt;
      if (next <= 0) { arcPos = 0; dir = 1; }
      else if (next >= track[track.length - 1].s) { arcPos = track[track.length - 1].s; dir = -1; }
      else arcPos = next;
    }

    function drawBar(x, baseY, w, frac, color, label, val, maxE) {
      const h = Math.max(0, frac * 70);
      ctx.fillStyle = "#e8e8ec";
      ctx.fillRect(x, baseY - 70, w, 70);
      ctx.fillStyle = color;
      ctx.fillRect(x, baseY - h, w, h);
      ctx.strokeStyle = "#e0dce8";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, baseY - 70, w, 70);
      ctx.fillStyle = "#292929";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label, x + w / 2, baseY + 12);
      ctx.fillText(val.toFixed(1) + " J", x + w / 2, baseY - h - 5);
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 3;
      ctx.lineJoin = "round";
      ctx.beginPath();
      for (let i = 0; i < track.length; i++) {
        const p = track[i];
        if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();

      const pt = sampleAt(arcPos);
      ctx.beginPath();
      ctx.arc(pt.x, pt.y - 13, 12, 0, Math.PI * 2);
      ctx.fillStyle = "#8043f0";
      ctx.fill();
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      const Ep = MASS * G * pt.h;
      const Ec = Math.max(0, Emec - Ep);
      const maxE = MASS * G * hStart;
      const baseY = cssH - 18;
      const bw = cssW < 340 ? 28 : 34;
      const gap = cssW < 340 ? 8 : 12;
      const bx = 14;
      drawBar(bx, baseY, bw, Ep / maxE, "#3498db", "Ep", Ep, maxE);
      drawBar(bx + bw + gap, baseY, bw, Ec / maxE, "#e67e22", "Ec", Ec, maxE);
      drawBar(bx + 2 * (bw + gap), baseY, bw, Emec / maxE, "#ffffff", "Emec", Emec, maxE);
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(bx + 2 * (bw + gap), baseY - Emec / maxE * 70, bw, Emec / maxE * 70 || 0);

      ctx.fillStyle = "rgba(255,255,255,0.93)";
      ctx.strokeStyle = "#e8e8ec";
      const pw = cssW < 360 ? cssW - 28 : 150;
      ctx.beginPath();
      ctx.roundRect(cssW - pw - 10, 10, pw, 52, 8);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#292929";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("h = " + pt.h.toFixed(2) + " m", cssW - pw - 2, 28);
      const vNow = Ec > 1e-4 ? Math.sqrt(2 * Ec / MASS) : 0;
      ctx.fillText("v = " + vNow.toFixed(2) + " m/s", cssW - pw - 2, 44);
      ctx.fillStyle = "#8043f0";
      ctx.fillText("Emec = " + Emec.toFixed(1) + " J", cssW - pw - 2, 58);
    }

    document.getElementById("h0").addEventListener("input", (e) => {
      hStart = Number(e.target.value);
      document.getElementById("h0Val").textContent = hStart.toFixed(1) + " m";
      reset();
    });
    document.getElementById("fricBtn").addEventListener("click", () => {
      friction = !friction;
      document.getElementById("fricBtn").classList.toggle("active", friction);
    });
    document.getElementById("resetBtn").addEventListener("click", reset);

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
