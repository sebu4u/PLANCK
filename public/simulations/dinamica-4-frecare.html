<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forța de frecare</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; }
    .sim {
      width: 100%; height: 100%; overflow: hidden;
      display: flex; flex-direction: column;
      padding: 2px 2px 54px;
    }
    .controls {
      flex: 0 0 auto; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px 8px; padding: 0 2px 6px;
    }
    .row { display: flex; align-items: center; gap: 5px; min-width: 0; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; flex-shrink: 0; }
    .row input[type=range] {
      flex: 1; min-width: 0; accent-color: var(--accent);
      height: 24px; touch-action: pan-y;
    }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 22px; text-align: right; flex-shrink: 0; }
    .stage {
      flex: 1 1 auto; min-height: 0; overflow: hidden;
      border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%);
      display: flex; flex-direction: column;
    }
    .stage canvas { flex: 1 1 auto; min-height: 0; width: 100%; display: block; touch-action: manipulation; }
    .sim-actions {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
      height: 54px; display: flex; align-items: center; justify-content: center;
      padding: 0 12px calc(6px + env(safe-area-inset-bottom, 0px));
      background: #fff; border-top: 1px solid var(--line);
    }
    .run-btn {
      width: min(100%, 300px); height: 42px; padding: 0 28px; border: none; border-radius: 999px;
      background: var(--accent); color: #fff; font: 700 12px ui-sans-serif, system-ui, sans-serif;
      cursor: pointer; touch-action: manipulation; user-select: none;
      box-shadow: 0 3px 12px rgba(128, 67, 240, 0.35); transition: background 0.15s, box-shadow 0.15s;
    }
    .run-btn.running { background: #e74c3c; box-shadow: 0 3px 12px rgba(231, 76, 60, 0.35); }
    .run-btn:active { transform: scale(0.98); }

    @media (max-width: 520px) {
      .controls { grid-template-columns: 1fr; gap: 4px; padding-bottom: 4px; }
      .row { min-height: 32px; gap: 8px; }
      .row label { font-size: 11px; min-width: 14px; }
      .row input[type=range] { height: 28px; }
      .val { font-size: 11px; min-width: 28px; }
      .stage { border-radius: 14px; }
      .sim { padding-bottom: 50px; }
      .sim-actions { height: 50px; }
      .run-btn { height: 40px; font-size: 13px; }
    }

    @media (max-height: 340px) {
      .controls { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 4px; }
      .row { min-height: 26px; }
      .row input[type=range] { height: 22px; }
      .sim { padding-bottom: 46px; }
      .sim-actions { height: 46px; }
      .run-btn { height: 36px; font-size: 11px; }
    }

    @media (max-width: 360px) {
      .row label { font-size: 10px; }
    }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row"><label for="f">F</label><input id="f" type="range" min="0" max="100" step="1" value="30"><span class="val" id="fVal">30</span></div>
      <div class="row"><label for="m">m</label><input id="m" type="range" min="1" max="20" step="1" value="5"><span class="val" id="mVal">5</span></div>
      <div class="row"><label for="mu">μ</label><input id="mu" type="range" min="0" max="100" step="1" value="30"><span class="val" id="muVal">0.30</span></div>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <div class="sim-actions">
    <button class="run-btn" type="button" id="runBtn">Start</button>
  </div>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const G = 9.81;

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let Fapp = 30, mass = 5, mu = 0.3;
    let x = 0, v = 0, moving = false, running = false;
    let layout = {};
    const START_X_RATIO = 0.25;

    function computeLayout() {
      const mobile = cssW < 520 || cssH < 280;
      const narrow = cssW < 360;
      const bw = mobile ? (narrow ? 44 : 52) : 64;
      const bh = mobile ? (narrow ? 30 : 36) : 44;
      const endMargin = Math.max(bw / 2 + 8, mobile ? 28 : 54);
      const floorY = cssH * (mobile ? 0.58 : 0.62);

      layout = {
        mobile, narrow, bw, bh, endMargin, floorY,
        labelFont: (mobile ? 8 : 9) + "px ui-sans-serif, system-ui, sans-serif",
        arrowMax: mobile ? 56 : 80,
        arrowScale: mobile ? 0.68 : 0.75
      };
    }

    function startX() { return cssW * START_X_RATIO; }

    function resetBody() {
      x = startX();
      v = 0;
      moving = false;
    }

    function setRunning(on) {
      running = on;
      const btn = document.getElementById("runBtn");
      btn.textContent = running ? "Stop" : "Start";
      btn.classList.toggle("running", running);
      postState();
    }

    function startSim() {
      resetBody();
      setRunning(true);
    }

    function stopSim() {
      v = 0;
      setRunning(false);
    }

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Forța de frecare",
        text: running ? (moving ? "frecare cinematică — corpul alunecă." : "frecare statică.") : "apasă Start pentru simulare.",
        paused: paused || !running
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      computeLayout();
      if (!running) resetBody();
      else x = Math.max(layout.endMargin, Math.min(cssW - layout.endMargin, x));
    }

    function muS() { return mu; }
    function muK() { return mu * 0.8; }
    function fMaxStatic() { return muS() * mass * G; }
    function fKinetic() { return muK() * mass * G; }

    function frictionForce() {
      if (!moving) return Math.min(Fapp, fMaxStatic());
      return fKinetic();
    }

    function update(dt) {
      if (paused || !running) return;
      const fStat = fMaxStatic();
      const edge = layout.endMargin;
      if (!moving && Fapp > fStat) moving = true;
      if (moving && Fapp <= fKinetic()) { moving = false; v = 0; }
      if (moving) {
        const a = (Fapp - fKinetic()) / mass;
        v += a * dt * (layout.mobile ? 18 : 20);
        x += v * dt;
        if (x < edge) { x = edge; v = 0; }
        if (x >= cssW - edge) {
          x = cssW - edge;
          v = 0;
          stopSim();
        }
      }
    }

    function drawArrow(ax, y, len, dir, color, label) {
      if (len < 4) return;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = layout.mobile ? 2 : 2.5;
      ctx.beginPath();
      ctx.moveTo(ax, y);
      ctx.lineTo(ax + dir * len, y);
      ctx.stroke();
      ctx.font = layout.labelFont;
      ctx.textAlign = "center";
      ctx.fillText(label, ax + dir * len / 2, y - (layout.mobile ? 4 : 6));
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      const { bw, bh, floorY, arrowMax, arrowScale } = layout;

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = layout.mobile ? 2 : 2.5;
      ctx.beginPath();
      ctx.moveTo(0, floorY);
      ctx.lineTo(cssW, floorY);
      ctx.stroke();

      ctx.fillStyle = moving ? "#8043f0" : "#292929";
      ctx.fillRect(x - bw / 2, floorY - bh, bw, bh);
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x - bw / 2, floorY - bh, bw, bh);

      const ff = frictionForce();
      const arrowGap = layout.mobile ? 14 : 18;
      drawArrow(x, floorY - bh - arrowGap, Math.min(arrowMax, Fapp * arrowScale), 1, "#8043f0", "F");
      drawArrow(x, floorY - bh - arrowGap * 2 - 2, Math.min(arrowMax, ff * arrowScale), -1, "#e74c3c", "Ff");

      const vertLen = layout.mobile ? 26 : 36;
      drawArrow(x, floorY + 8, vertLen, -1, "#3498db", "N");
      drawArrow(x, floorY + 8, vertLen, 1, "#292929", "G");
    }

    document.getElementById("f").addEventListener("input", (e) => { Fapp = Number(e.target.value); document.getElementById("fVal").textContent = Fapp; });
    document.getElementById("m").addEventListener("input", (e) => { mass = Math.max(1, Number(e.target.value)); document.getElementById("mVal").textContent = mass; });
    document.getElementById("mu").addEventListener("input", (e) => {
      mu = Number(e.target.value) / 100;
      document.getElementById("muVal").textContent = mu.toFixed(2);
    });

    document.getElementById("runBtn").addEventListener("click", () => {
      if (running) stopSim();
      else startSim();
    });

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas.parentElement);
    resize();
    resetBody();
    postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
