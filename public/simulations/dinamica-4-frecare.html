<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forța de frecare</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 80px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    .row input[type=range] { flex: 1; min-width: 45px; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 24px; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row"><label for="f">F</label><input id="f" type="range" min="0" max="100" step="1" value="30"><span class="val" id="fVal">30</span></div>
      <div class="row"><label for="m">m</label><input id="m" type="range" min="1" max="20" step="1" value="5"><span class="val" id="mVal">5</span></div>
      <div class="row"><label for="mu">μ</label><input id="mu" type="range" min="0" max="100" step="1" value="30"><span class="val" id="muVal">0.30</span></div>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const G = 9.81;

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let Fapp = 30, mass = 5, mu = 0.3;
    let x = 0, v = 0, moving = false;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Forța de frecare",
        text: "frecare statică și cinematică.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      x = cssW * 0.25;
    }

    function muS() { return mu; }
    function muK() { return mu * 0.8; }
    function fMaxStatic() { return muS() * mass * G; }
    function fKinetic() { return muK() * mass * G; }

    function frictionForce() {
      if (!moving) return Math.min(Fapp, fMaxStatic());
      return fKinetic();
    }

    function update(dt) {
      if (paused) return;
      const fStat = fMaxStatic();
      if (!moving && Fapp > fStat) moving = true;
      if (moving && Fapp <= fKinetic()) { moving = false; v = 0; }
      if (moving) {
        const a = (Fapp - fKinetic()) / mass;
        v += a * dt * 20;
        x += v * dt;
        if (x < 50) { x = 50; v = 0; }
        if (x > cssW - 50) { x = cssW - 50; v = 0; }
      }
    }

    function drawArrow(x, y, len, dir, color, label) {
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + dir * len, y);
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label, x + dir * len / 2, y - 6);
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);
      const floorY = cssH * 0.55;

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, floorY);
      ctx.lineTo(cssW, floorY);
      ctx.stroke();

      const bw = 48, bh = 32;
      ctx.fillStyle = moving ? "#8043f0" : "#292929";
      ctx.fillRect(x - bw / 2, floorY - bh, bw, bh);

      const ff = frictionForce();
      drawArrow(x, floorY - bh - 20, Math.min(70, Fapp * 0.7), 1, "#8043f0", "F");
      drawArrow(x, floorY - bh - 36, Math.min(70, ff * 0.7), -1, "#e74c3c", "Ff");
      drawArrow(x, floorY + 8, 30, -1, "#3498db", "N");
      drawArrow(x, floorY + 8, 30, 1, "#292929", "G");

      const gy = cssH * 0.72;
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.strokeStyle = "#e8e8ec";
      ctx.beginPath();
      ctx.roundRect(10, gy, cssW - 20, cssH * 0.22, 8);
      ctx.fill(); ctx.stroke();

      ctx.strokeStyle = "#8043f0";
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let fa = 0; fa <= 100; fa += 2) {
        const fs = fa <= fMaxStatic() ? fa : fKinetic();
        const px = 20 + fa / 100 * (cssW - 40);
        const py = gy + cssH * 0.18 - fs / 100 * cssH * 0.14;
        if (fa === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();

      ctx.fillStyle = "#292929";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Ff vs F_aplicată", 18, gy + 14);
      ctx.fillText(moving ? "Cinematică" : "Statică", 18, gy + 28);
    }

    document.getElementById("f").addEventListener("input", (e) => { Fapp = Number(e.target.value); document.getElementById("fVal").textContent = Fapp; });
    document.getElementById("m").addEventListener("input", (e) => { mass = Math.max(1, Number(e.target.value)); document.getElementById("mVal").textContent = mass; });
    document.getElementById("mu").addEventListener("input", (e) => {
      mu = Number(e.target.value) / 100;
      document.getElementById("muVal").textContent = mu.toFixed(2);
    });

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
