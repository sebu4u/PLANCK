<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atracția gravitațională</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 90px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    .row input[type=range] { flex: 1; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 24px; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row"><label for="m1">m₁</label><input id="m1" type="range" min="10" max="200" step="5" value="60"><span class="val" id="m1Val">60</span></div>
      <div class="row"><label for="m2">m₂</label><input id="m2" type="range" min="10" max="200" step="5" value="100"><span class="val" id="m2Val">100</span></div>
      <div class="row"><label for="G">G</label><input id="G" type="range" min="1" max="50" step="1" value="20"><span class="val" id="GVal">20</span></div>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const PX_PER_M = 22;
    const G_SCALE = 8000;

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let Gconst = 20;
    let dragging = null, pointerId = null, touching = false;

    const planets = [
      { x: 0, y: 0, vx: 0, vy: 0, m: 60, r: 26, color: "#8043f0", label: "1" },
      { x: 0, y: 0, vx: 0, vy: 0, m: 100, r: 34, color: "#3498db", label: "2" }
    ];

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Atracția gravitațională",
        text: touching ? "Planetele se ating — trage-le pentru a le separa." : "F = G·m₁·m₂/d²",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (planets[0].x === 0 && planets[0].y === 0) {
        planets[0].x = cssW * 0.28;
        planets[0].y = cssH * 0.5;
        planets[1].x = cssW * 0.72;
        planets[1].y = cssH * 0.5;
      }
      clampAll();
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function hitPlanet(p) {
      for (let i = planets.length - 1; i >= 0; i--) {
        const pl = planets[i];
        if (Math.hypot(p.x - pl.x, p.y - pl.y) <= pl.r + 10) return i;
      }
      return -1;
    }

    function clampPlanet(p) {
      p.x = Math.max(p.r + 8, Math.min(cssW - p.r - 8, p.x));
      p.y = Math.max(p.r + 8, Math.min(cssH - p.r - 8, p.y));
    }

    function clampAll() {
      planets.forEach(clampPlanet);
    }

    function separation() {
      const dx = planets[1].x - planets[0].x;
      const dy = planets[1].y - planets[0].y;
      const d = Math.hypot(dx, dy) || 1;
      return { dx, dy, d, ux: dx / d, uy: dy / d };
    }

    function minSep() { return planets[0].r + planets[1].r; }

    function forceMag(dM) {
      const d = Math.max(dM, minSep());
      return (Gconst * G_SCALE * planets[0].m * planets[1].m) / (d * d);
    }

    function isTouching() {
      return separation().d <= minSep() + 0.5;
    }

    function resolveContact() {
      const { ux, uy, d } = separation();
      const overlap = minSep() - d;
      if (overlap <= 0) return false;
      const midX = (planets[0].x + planets[1].x) / 2;
      const midY = (planets[0].y + planets[1].y) / 2;
      planets[0].x = midX - ux * minSep() / 2;
      planets[0].y = midY - uy * minSep() / 2;
      planets[1].x = midX + ux * minSep() / 2;
      planets[1].y = midY + uy * minSep() / 2;
      planets[0].vx = planets[0].vy = 0;
      planets[1].vx = planets[1].vy = 0;
      return true;
    }

    function update(dt) {
      if (paused || dragging !== null) return;

      const { dx, dy, d, ux, uy } = separation();
      if (d <= minSep()) {
        touching = true;
        resolveContact();
        return;
      }
      touching = false;

      const F = forceMag(d);
      const a1 = (F / planets[0].m) * 0.028;
      const a2 = (F / planets[1].m) * 0.028;

      planets[0].vx += ux * a1 * dt * 60;
      planets[0].vy += uy * a1 * dt * 60;
      planets[1].vx -= ux * a2 * dt * 60;
      planets[1].vy -= uy * a2 * dt * 60;

      planets[0].x += planets[0].vx * dt;
      planets[0].y += planets[0].vy * dt;
      planets[1].x += planets[1].vx * dt;
      planets[1].y += planets[1].vy * dt;

      clampAll();
      if (isTouching()) {
        touching = true;
        resolveContact();
        postState();
      }
    }

    function drawArrow(x0, y0, x1, y1, color, width) {
      const dx = x1 - x0, dy = y1 - y0;
      const len = Math.hypot(dx, dy) || 1;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
      const ux = dx / len, uy = dy / len;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 - ux * 9 - uy * 5, y1 - uy * 9 + ux * 5);
      ctx.lineTo(x1 - ux * 9 + uy * 5, y1 - uy * 9 - ux * 5);
      ctx.closePath();
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      const { dx, dy, d, ux, uy } = separation();
      const dM = d / PX_PER_M;
      const F = forceMag(d);

      const midX = (planets[0].x + planets[1].x) / 2;
      const midY = (planets[0].y + planets[1].y) / 2;
      const perpX = -uy, perpY = ux;
      const off = 18;

      ctx.strokeStyle = "rgba(41,41,41,0.25)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.moveTo(planets[0].x, planets[0].y);
      ctx.lineTo(planets[1].x, planets[1].y);
      ctx.stroke();
      ctx.setLineDash([]);

      const lx0 = planets[0].x + perpX * off;
      const ly0 = planets[0].y + perpY * off;
      const lx1 = planets[1].x + perpX * off;
      const ly1 = planets[1].y + perpY * off;
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(lx0, ly0);
      ctx.lineTo(lx1, ly1);
      ctx.stroke();
      const tick = 6;
      ctx.beginPath();
      ctx.moveTo(lx0 - perpX * tick, ly0 - perpY * tick);
      ctx.lineTo(lx0 + perpX * tick, ly0 + perpY * tick);
      ctx.moveTo(lx1 - perpX * tick, ly1 - perpY * tick);
      ctx.lineTo(lx1 + perpX * tick, ly1 + perpY * tick);
      ctx.stroke();

      ctx.fillStyle = "#292929";
      ctx.font = "700 11px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("d = " + dM.toFixed(2) + " m", (lx0 + lx1) / 2, (ly0 + ly1) / 2 - 8);

      const arrowScale = Math.min(55, 12 + Math.sqrt(F) * 0.35);
      drawArrow(
        planets[0].x + ux * planets[0].r,
        planets[0].y + uy * planets[0].r,
        planets[0].x + ux * (planets[0].r + arrowScale),
        planets[0].y + uy * (planets[0].r + arrowScale),
        "#e74c3c", 2.5
      );
      drawArrow(
        planets[1].x - ux * planets[1].r,
        planets[1].y - uy * planets[1].r,
        planets[1].x - ux * (planets[1].r + arrowScale),
        planets[1].y - uy * (planets[1].r + arrowScale),
        "#e74c3c", 2.5
      );

      ctx.fillStyle = "#e74c3c";
      ctx.font = "700 10px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("F = " + F.toFixed(1) + " N", midX, midY - 22);

      planets.forEach((p) => {
        const grad = ctx.createRadialGradient(p.x - p.r * 0.3, p.y - p.r * 0.3, p.r * 0.1, p.x, p.y, p.r);
        grad.addColorStop(0, p.color);
        grad.addColorStop(1, shade(p.color, -30));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = "#292929";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = "700 11px ui-sans-serif, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("m" + p.label, p.x, p.y + 4);
      });

      ctx.fillStyle = "rgba(41,41,41,0.45)";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Trage planetele — se atrag cu F = G·m₁·m₂/d²", cssW * 0.5, cssH - 8);
    }

    function shade(hex, amt) {
      const n = parseInt(hex.slice(1), 16);
      const r = Math.max(0, Math.min(255, (n >> 16) + amt));
      const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amt));
      const b = Math.max(0, Math.min(255, (n & 255) + amt));
      return "rgb(" + r + "," + g + "," + b + ")";
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused) return;
      const p = ptr(e);
      const idx = hitPlanet(p);
      if (idx < 0) return;
      dragging = idx;
      pointerId = e.pointerId;
      touching = false;
      planets[idx].vx = planets[idx].vy = 0;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener("pointermove", (e) => {
      if (dragging === null || e.pointerId !== pointerId) return;
      const p = ptr(e);
      planets[dragging].x = p.x;
      planets[dragging].y = p.y;
      clampPlanet(planets[dragging]);
      if (isTouching()) resolveContact();
    });

    canvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = null;
      pointerId = null;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(e.pointerId);
      touching = isTouching();
      if (touching) resolveContact();
      postState();
    });

    canvas.addEventListener("pointercancel", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = null;
      pointerId = null;
      canvas.classList.remove("dragging");
    });

    document.getElementById("m1").addEventListener("input", (e) => {
      planets[0].m = Number(e.target.value);
      planets[0].r = 18 + planets[0].m * 0.08;
      document.getElementById("m1Val").textContent = planets[0].m;
    });
    document.getElementById("m2").addEventListener("input", (e) => {
      planets[1].m = Number(e.target.value);
      planets[1].r = 18 + planets[1].m * 0.08;
      document.getElementById("m2Val").textContent = planets[1].m;
    });
    document.getElementById("G").addEventListener("input", (e) => {
      Gconst = Number(e.target.value);
      document.getElementById("GVal").textContent = Gconst;
    });

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize();
    postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
