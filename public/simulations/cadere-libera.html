<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Căderea liberă</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #292929;
      --line: #e8e8ec;
      --accent: #8043f0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { display: grid; place-items: stretch; }

    .sim {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      padding: 2px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .tab {
      min-height: 34px;
      border: 1px solid #e0dce8;
      border-radius: 999px;
      background: #ffffff;
      color: var(--text);
      font: 700 11px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
      touch-action: manipulation;
    }

    .tab.active {
      border-color: var(--text);
      background: var(--text);
      color: #ffffff;
    }

    .stage {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (min-width: 420px) {
      .sim { gap: 12px; }
      .tabs { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .tab { min-height: 32px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <main class="sim">
    <nav class="tabs" aria-label="Cădere liberă">
      <button class="tab active" type="button" data-type="earth">Pământ</button>
      <button class="tab" type="button" data-type="moon">Lună</button>
      <button class="tab" type="button" data-type="jupiter">Jupiter</button>
      <button class="tab" type="button" data-type="vacuum">Vid</button>
    </nav>

    <section class="stage" aria-label="Simulare cădere liberă">
      <canvas id="canvas"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    const TYPES = {
      earth: {
        name: "Cădere pe Pământ",
        text: "viteza crește uniform sub acțiunea gravitației.",
        color: "#8043f0",
        g: 1
      },
      moon: {
        name: "Cădere pe Lună",
        text: "accelerația este mai mică, deci căderea e mai lentă.",
        color: "#292929",
        g: 0.38
      },
      jupiter: {
        name: "Cădere pe Jupiter",
        text: "accelerația mare face corpul să cadă mai repede.",
        color: "#8043f0",
        g: 1.55
      },
      vacuum: {
        name: "În vid",
        text: "toate corpurile cad la fel, fără rezistența aerului.",
        color: "#292929",
        g: 1
      }
    };

    let type = "earth";
    let time = 0;
    let paused = false;
    let trail = [];
    let cssW = 0;
    let cssH = 0;
    let dpr = 1;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: TYPES[type].name,
        text: TYPES[type].text,
        paused
      }, "*");
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      cssW = Math.max(1, rect.width);
      cssH = Math.max(1, rect.height);
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      trail = [];
    }

    function stateAt(t) {
      const top = Math.max(20, cssH * 0.12);
      const ground = cssH - Math.max(20, cssH * 0.14);
      const fallTime = 2.15 / Math.sqrt(TYPES[type].g);
      const p = (t % fallTime) / fallTime;
      const eased = p * p;
      return {
        x: cssW * 0.5,
        y: top + eased * (ground - top),
        p,
        ground,
        speed: p * TYPES[type].g
      };
    }

    function drawGrid(ground) {
      ctx.strokeStyle = "rgba(41,41,41,0.08)";
      ctx.lineWidth = 1;
      for (let y = 24; y < ground; y += cssH < 220 ? 28 : 34) {
        ctx.beginPath();
        ctx.moveTo(16, y);
        ctx.lineTo(cssW - 16, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(41,41,41,0.3)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(18, ground);
      ctx.lineTo(cssW - 18, ground);
      ctx.stroke();
    }

    function drawTrail() {
      const max = cssH < 220 ? 28 : 38;
      while (trail.length > max) trail.shift();
      if (trail.length < 2) return;

      ctx.strokeStyle = TYPES[type].color === "#8043f0" ? "rgba(128,67,240,0.32)" : "rgba(41,41,41,0.24)";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.beginPath();
      trail.forEach((point, index) => {
        if (index === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();
    }

    function drawBody(state) {
      const color = TYPES[type].color;
      const arrowLength = Math.min(cssH * 0.2, 20 + state.speed * 44);

      ctx.beginPath();
      ctx.moveTo(state.x + 28, state.y - 4);
      ctx.lineTo(state.x + 28, state.y + arrowLength);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(state.x + 28, state.y + arrowLength);
      ctx.lineTo(state.x + 23, state.y + arrowLength - 8);
      ctx.lineTo(state.x + 33, state.y + arrowLength - 8);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();

      ctx.fillStyle = color;
      ctx.font = "700 10px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("g", state.x + 37, state.y + Math.min(arrowLength, 42));

      ctx.beginPath();
      ctx.arc(state.x, state.y, 15, 0, Math.PI * 2);
      ctx.fillStyle = color === "#8043f0" ? "rgba(128,67,240,0.16)" : "rgba(41,41,41,0.12)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(state.x, state.y, 7, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function frame() {
      if (!paused) time += 0.016;

      const state = stateAt(time);
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cssW, cssH);
      drawGrid(state.ground);

      if (!paused || trail.length === 0) trail.push({ x: state.x, y: state.y });
      drawTrail();
      drawBody(state);

      requestAnimationFrame(frame);
    }

    function setType(nextType) {
      type = nextType;
      time = 0;
      trail = [];
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.type === type));
      postState();
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setType(tab.dataset.type));
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type !== "learning-path-simulation-set-paused" && data.type !== "trajectory-simulation-set-paused") return;
      paused = Boolean(data.paused);
      postState();
    });

    new ResizeObserver(resize).observe(canvas);
    resize();
    postState();
    frame();
  </script>
</body>
</html>
