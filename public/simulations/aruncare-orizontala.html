<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aruncarea pe orizontală</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #292929;
      --line: #e8e8ec;
      --accent: #8043f0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { display: grid; place-items: stretch; }

    .sim {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      padding: 2px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .tab {
      min-height: 34px;
      border: 1px solid #e0dce8;
      border-radius: 999px;
      background: #ffffff;
      color: var(--text);
      font: 700 11px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
      touch-action: manipulation;
    }

    .tab.active {
      border-color: var(--text);
      background: var(--text);
      color: #ffffff;
    }

    .stage {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (min-width: 420px) {
      .sim { gap: 12px; }
      .tabs { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .tab { min-height: 32px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <main class="sim">
    <nav class="tabs" aria-label="Aruncarea pe orizontală">
      <button class="tab active" type="button" data-type="normal">Normal</button>
      <button class="tab" type="button" data-type="fast">v₀ mare</button>
      <button class="tab" type="button" data-type="high">Mai sus</button>
      <button class="tab" type="button" data-type="slow">v₀ mic</button>
    </nav>

    <section class="stage" aria-label="Simulare aruncare orizontală">
      <canvas id="canvas"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    const TYPES = {
      normal: {
        name: "Aruncare orizontală",
        text: "orizontal viteza rămâne constantă, vertical corpul cade.",
        color: "#8043f0",
        vx: 1,
        height: 1
      },
      fast: {
        name: "Viteză inițială mare",
        text: "corpul ajunge mai departe până atinge solul.",
        color: "#8043f0",
        vx: 1.35,
        height: 1
      },
      high: {
        name: "Înălțime mai mare",
        text: "timpul de cădere crește, deci raza de acțiune crește.",
        color: "#292929",
        vx: 1,
        height: 1.25
      },
      slow: {
        name: "Viteză inițială mică",
        text: "corpul cade pe aceeași durată, dar ajunge mai aproape.",
        color: "#292929",
        vx: 0.7,
        height: 1
      }
    };

    let type = "normal";
    let time = 0;
    let paused = false;
    let trail = [];
    let cssW = 0;
    let cssH = 0;
    let dpr = 1;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: TYPES[type].name,
        text: TYPES[type].text,
        paused
      }, "*");
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      cssW = Math.max(1, rect.width);
      cssH = Math.max(1, rect.height);
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      trail = [];
    }

    function stateAt(t) {
      const config = TYPES[type];
      const left = Math.max(22, cssW * 0.08);
      const ground = cssH - Math.max(22, cssH * 0.14);
      const launchY = Math.max(22, ground - cssH * 0.58 * config.height);
      const span = cssW - left * 2;
      const duration = 2.25 * Math.sqrt(config.height);
      const p = (t % duration) / duration;
      return {
        x: left + p * span * config.vx,
        y: launchY + p * p * (ground - launchY),
        left,
        launchY,
        ground,
        p
      };
    }

    function drawGrid(state) {
      ctx.strokeStyle = "rgba(41,41,41,0.08)";
      ctx.lineWidth = 1;
      for (let x = 24; x < cssW; x += cssW < 360 ? 34 : 42) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, state.ground);
        ctx.stroke();
      }
      for (let y = 24; y < state.ground; y += cssH < 220 ? 28 : 34) {
        ctx.beginPath();
        ctx.moveTo(16, y);
        ctx.lineTo(cssW - 16, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(41,41,41,0.3)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(18, state.ground);
      ctx.lineTo(cssW - 18, state.ground);
      ctx.stroke();

      ctx.strokeStyle = "rgba(128,67,240,0.25)";
      ctx.setLineDash([4, 5]);
      ctx.beginPath();
      ctx.moveTo(state.left, state.launchY);
      ctx.lineTo(cssW - 18, state.launchY);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawTrail() {
      const max = cssW < 360 ? 48 : 64;
      while (trail.length > max) trail.shift();
      if (trail.length < 2) return;

      ctx.strokeStyle = TYPES[type].color === "#8043f0" ? "rgba(128,67,240,0.36)" : "rgba(41,41,41,0.26)";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.beginPath();
      trail.forEach((point, index) => {
        if (index === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();
    }

    function drawArrow(x, y, length, color, vertical) {
      const endX = vertical ? x : x + length;
      const endY = vertical ? y + length : y;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(endX, endY);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(endX, endY);
      if (vertical) {
        ctx.lineTo(endX - 5, endY - 8);
        ctx.lineTo(endX + 5, endY - 8);
      } else {
        ctx.lineTo(endX - 8, endY - 5);
        ctx.lineTo(endX - 8, endY + 5);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawBody(state) {
      const color = TYPES[type].color;
      const horizontal = Math.min(cssW * 0.19, 28 + TYPES[type].vx * 16);
      const vertical = Math.min(cssH * 0.18, 16 + state.p * 42);

      drawArrow(state.x + 8, state.y - 24, horizontal, color, false);
      drawArrow(state.x + 26, state.y + 3, vertical, "#8043f0", true);

      ctx.beginPath();
      ctx.arc(state.x, state.y, 15, 0, Math.PI * 2);
      ctx.fillStyle = color === "#8043f0" ? "rgba(128,67,240,0.16)" : "rgba(41,41,41,0.12)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(state.x, state.y, 7, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function frame() {
      if (!paused) time += 0.016;

      const state = stateAt(time);
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cssW, cssH);
      drawGrid(state);

      if (!paused || trail.length === 0) trail.push({ x: state.x, y: state.y });
      drawTrail();
      drawBody(state);

      requestAnimationFrame(frame);
    }

    function setType(nextType) {
      type = nextType;
      time = 0;
      trail = [];
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.type === type));
      postState();
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setType(tab.dataset.type));
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type !== "learning-path-simulation-set-paused" && data.type !== "trajectory-simulation-set-paused") return;
      paused = Boolean(data.paused);
      postState();
    });

    new ResizeObserver(resize).observe(canvas);
    resize();
    postState();
    frame();
  </script>
</body>
</html>
