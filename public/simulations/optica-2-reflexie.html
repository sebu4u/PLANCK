<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflexia luminii</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 2px; }
    .tab { min-height: 32px; padding: 0 14px; border: 1px solid #e0dce8; border-radius: 999px; background: #fff;
      color: var(--text); font: 700 10px ui-sans-serif, system-ui, sans-serif; cursor: pointer; touch-action: manipulation; }
    .tab.active { border-color: var(--text); background: var(--text); color: #fff; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <button class="tab active" type="button" data-mirror="flat">Oglindă plană</button>
      <button class="tab" type="button" data-mirror="concave">Concavă</button>
      <button class="tab" type="button" data-mirror="convex">Convexă</button>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let mirrorType = "flat";
    let sourceAngle = -Math.PI / 4;
    let dragging = false, pointerId = null;

    const MIRROR_Y_RATIO = 0.78;

    function postState() {
      const names = { flat: "Oglindă plană", concave: "Oglindă concavă", convex: "Oglindă convexă" };
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Reflexia luminii",
        text: names[mirrorType] + " — unghiul i = unghiul r.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function mirrorY() { return cssH * MIRROR_Y_RATIO; }
    function mirrorCenterX() { return cssW * 0.5; }

    function reflect(d, n) {
      const dot = d.x * n.x + d.y * n.y;
      return { x: d.x - 2 * dot * n.x, y: d.y - 2 * dot * n.y };
    }

    function flatHit(px, py, dx, dy) {
      const my = mirrorY();
      if (Math.abs(dy) < 1e-9) return null;
      const t = (my - py) / dy;
      if (t <= 0) return null;
      const hx = px + dx * t, hy = my;
      if (hx < cssW * 0.08 || hx > cssW * 0.92) return null;
      return { x: hx, y: hy, t, nx: 0, ny: -1 };
    }

    function curvedHit(px, py, dx, dy, sign) {
      const cx = mirrorCenterX(), cy = mirrorY() + sign * 120;
      const R = 140;
      const ox = px - cx, oy = py - cy;
      const a = dx * dx + dy * dy;
      const b = 2 * (ox * dx + oy * dy);
      const c = ox * ox + oy * oy - R * R;
      const disc = b * b - 4 * a * c;
      if (disc < 0) return null;
      let t1 = (-b - Math.sqrt(disc)) / (2 * a);
      let t2 = (-b + Math.sqrt(disc)) / (2 * a);
      let t = t1 > 0.001 ? t1 : t2;
      if (t <= 0.001) return null;
      const hx = px + dx * t, hy = py + dy * t;
      if (hx < cssW * 0.06 || hx > cssW * 0.94) return null;
      const nx = (hx - cx) / R;
      const ny = (hy - cy) / R;
      const inward = sign > 0 ? -1 : 1;
      return { x: hx, y: hy, t, nx: nx * inward, ny: ny * inward };
    }

    function traceRay() {
      const cx = cssW * 0.5, cy = cssH * 0.32;
      const radius = Math.min(cssW, cssH) * 0.28;
      const sx = cx + Math.cos(sourceAngle) * radius;
      const sy = cy + Math.sin(sourceAngle) * radius;
      const dx = cx - sx, dy = cy - sy;
      const len = Math.hypot(dx, dy) || 1;
      const dir = { x: dx / len, y: dy / len };

      let hit;
      if (mirrorType === "flat") hit = flatHit(sx, sy, dir.x, dir.y);
      else if (mirrorType === "concave") hit = curvedHit(sx, sy, dir.x, dir.y, 1);
      else hit = curvedHit(sx, sy, dir.x, dir.y, -1);

      if (!hit) return { sx, sy, cx, cy, valid: false, iDeg: 0, rDeg: 0, hit: null };

      const nLen = Math.hypot(hit.nx, hit.ny) || 1;
      const n = { x: hit.nx / nLen, y: hit.ny / nLen };
      const rd = reflect(dir, n);
      const cosI = Math.abs(dir.x * n.x + dir.y * n.y);
      const iDeg = Math.round(Math.acos(Math.min(1, cosI)) * 180 / Math.PI);
      const rDeg = iDeg;

      const ext = 400;
      return {
        sx, sy, hx: hit.x, hy: hit.y,
        rx: hit.x + rd.x * ext, ry: hit.y + rd.y * ext,
        nx: n.x, ny: n.y, iDeg, rDeg, valid: true, hit
      };
    }

    function drawArc(cx, cy, r, a0, a1, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(cx, cy, r, a0, a1);
      ctx.stroke();
    }

    function drawAngleLabel(x, y, text, color) {
      ctx.fillStyle = color;
      ctx.font = "700 11px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(text, x, y);
    }

    function drawMirror() {
      const my = mirrorY(), mcx = mirrorCenterX();
      ctx.lineWidth = 3;
      if (mirrorType === "flat") {
        ctx.strokeStyle = "#8043f0";
        ctx.beginPath();
        ctx.moveTo(cssW * 0.08, my);
        ctx.lineTo(cssW * 0.92, my);
        ctx.stroke();
        ctx.fillStyle = "rgba(128,67,240,0.08)";
        ctx.fillRect(cssW * 0.08, my, cssW * 0.84, cssH - my);
      } else {
        const sign = mirrorType === "concave" ? 1 : -1;
        const cy = my + sign * 120;
        ctx.strokeStyle = "#8043f0";
        ctx.beginPath();
        ctx.arc(mcx, cy, 140, sign > 0 ? Math.PI * 0.08 : Math.PI * 1.08, sign > 0 ? Math.PI * 0.92 : Math.PI * 1.92);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      drawMirror();
      const ray = traceRay();

      const cx = cssW * 0.5, cy = cssH * 0.32;
      const radius = Math.min(cssW, cssH) * 0.28;

      ctx.setLineDash([5, 4]);
      ctx.strokeStyle = "rgba(41,41,41,0.2)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, Math.PI * 0.05, Math.PI * 0.95);
      ctx.stroke();
      ctx.setLineDash([]);

      if (ray.valid) {
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = "rgba(41,41,41,0.45)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(ray.hx, ray.hy);
        ctx.lineTo(ray.hx + ray.nx * 40, ray.hy + ray.ny * 40);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = "#8043f0";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(ray.sx, ray.sy);
        ctx.lineTo(ray.hx, ray.hy);
        ctx.lineTo(ray.rx, ray.ry);
        ctx.stroke();

        const nAng = Math.atan2(-ray.ny, -ray.nx);
        drawArc(ray.hx, ray.hy, 28, nAng - ray.iDeg * Math.PI / 180, nAng, "#292929");
        const rDir = Math.atan2(ray.ry - ray.hy, ray.rx - ray.hx);
        drawArc(ray.hx, ray.hy, 36, nAng, rDir, "#8043f0");

        drawAngleLabel(ray.hx - 36, ray.hy - 14, "i = " + ray.iDeg + "°", "#292929");
        drawAngleLabel(ray.hx + 36, ray.hy - 14, "r = " + ray.rDeg + "°", "#8043f0");
      }

      ctx.fillStyle = dragging ? "#8043f0" : "#292929";
      ctx.beginPath();
      ctx.arc(ray.sx, ray.sy, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#292929";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Trage sursa pe semicerc", 10, 18);
      ctx.fillStyle = "#8043f0";
      ctx.font = "700 12px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("i = r", cssW - 52, 18);
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function angleFromPoint(x, y) {
      const cx = cssW * 0.5, cy = cssH * 0.32;
      let a = Math.atan2(y - cy, x - cx);
      a = Math.max(Math.PI * 0.05, Math.min(Math.PI * 0.95, a));
      return a;
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused) return;
      dragging = true; pointerId = e.pointerId;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(e.pointerId);
      const p = ptr(e);
      sourceAngle = angleFromPoint(p.x, p.y);
    });
    canvas.addEventListener("pointermove", (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      const p = ptr(e);
      sourceAngle = angleFromPoint(p.x, p.y);
    });
    canvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false; pointerId = null;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(e.pointerId);
    });

    tabs.forEach((t) => t.addEventListener("click", () => {
      mirrorType = t.dataset.mirror;
      tabs.forEach((x) => x.classList.toggle("active", x === t));
      postState();
    }));

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") {
        paused = Boolean(d.paused); postState();
      }
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    (function loop() { draw(); requestAnimationFrame(loop); })();
  </script>
</body>
</html>
