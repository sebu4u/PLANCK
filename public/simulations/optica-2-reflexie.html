<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflexia luminii</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; padding: 2px; }
    .stage { width: 100%; height: 100%; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="sim">
    <section class="stage" aria-label="Simulare reflexie — oglindă plană">
      <canvas id="canvas"></canvas>
    </section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let sourceAngle = -Math.PI / 2;
    let dragging = false, pointerId = null;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Reflexia luminii",
        text: "oglindă plană — unghiul i = unghiul r.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function layout() {
      const mirrorY = cssH * 0.78;
      const pivot = { x: cssW * 0.5, y: cssH * 0.28 };
      const arcR = Math.min(cssW, cssH) * 0.24;
      return { mirrorY, pivot, arcR, mirrorLeft: cssW * 0.08, mirrorRight: cssW * 0.92 };
    }

    function sourcePos(L) {
      return {
        x: L.pivot.x + Math.cos(sourceAngle) * L.arcR,
        y: L.pivot.y + Math.sin(sourceAngle) * L.arcR
      };
    }

    function traceRay(L) {
      const src = sourcePos(L);
      const dx = L.pivot.x - src.x;
      const dy = L.pivot.y - src.y;
      const len = Math.hypot(dx, dy) || 1;
      const dir = { x: dx / len, y: dy / len };

      if (dir.y <= 0.001) return null;

      const t = (L.mirrorY - src.y) / dir.y;
      if (t <= 0) return null;

      const hx = src.x + dir.x * t;
      const hy = L.mirrorY;

      if (hx < L.mirrorLeft || hx > L.mirrorRight) return null;

      const nx = 0, ny = -1;
      const dot = dir.x * nx + dir.y * ny;
      const refl = { x: dir.x - 2 * dot * nx, y: dir.y - 2 * dot * ny };

      const cosI = Math.abs(dot);
      const iDeg = Math.round(Math.acos(Math.min(1, cosI)) * 180 / Math.PI);

      const ext = Math.max(cssW, cssH);
      const end = clipRay(hx, hy, refl.x, refl.y, ext);

      return { src, hx, hy, end, dir, refl, nx, ny, iDeg, rDeg: iDeg };
    }

    function clipRay(x0, y0, dx, dy, maxLen) {
      let t = maxLen;
      if (dx > 0) t = Math.min(t, (cssW - 8 - x0) / dx);
      if (dx < 0) t = Math.min(t, (x0 - 8) / -dx);
      if (dy > 0) t = Math.min(t, (cssH - 8 - y0) / dy);
      if (dy < 0) t = Math.min(t, (y0 - 8) / -dy);
      return { x: x0 + dx * t, y: y0 + dy * t };
    }

    function drawAngleArc(cx, cy, fromAng, toAng, radius, color) {
      let diff = toAng - fromAng;
      while (diff <= -Math.PI) diff += 2 * Math.PI;
      while (diff > Math.PI) diff -= 2 * Math.PI;
      const ccw = diff < 0;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, fromAng, fromAng + diff, ccw);
      ctx.stroke();
      return fromAng + diff / 2;
    }

    function drawAngleLabel(cx, cy, bisectAng, radius, text, color) {
      const lx = cx + Math.cos(bisectAng) * (radius + 14);
      const ly = cy + Math.sin(bisectAng) * (radius + 14);
      ctx.fillStyle = color;
      ctx.font = "700 11px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, lx, ly);
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      const L = layout();
      const ray = traceRay(L);
      const src = sourcePos(L);

      ctx.strokeStyle = "#8043f0";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(L.mirrorLeft, L.mirrorY);
      ctx.lineTo(L.mirrorRight, L.mirrorY);
      ctx.stroke();
      ctx.fillStyle = "rgba(128,67,240,0.07)";
      ctx.fillRect(L.mirrorLeft, L.mirrorY, L.mirrorRight - L.mirrorLeft, cssH - L.mirrorY);

      ctx.setLineDash([5, 4]);
      ctx.strokeStyle = "rgba(41,41,41,0.2)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(L.pivot.x, L.pivot.y, L.arcR, Math.PI, 0);
      ctx.stroke();
      ctx.setLineDash([]);

      if (ray) {
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = "rgba(41,41,41,0.45)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(ray.hx, ray.hy);
        ctx.lineTo(ray.hx, ray.hy - 36);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = "#8043f0";
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(ray.src.x, ray.src.y);
        ctx.lineTo(ray.hx, ray.hy);
        ctx.lineTo(ray.end.x, ray.end.y);
        ctx.stroke();

        const normalAng = -Math.PI / 2;
        const incomingAng = Math.atan2(-ray.dir.y, -ray.dir.x);
        const reflectedAng = Math.atan2(ray.refl.y, ray.refl.x);

        const iBisect = drawAngleArc(ray.hx, ray.hy, incomingAng, normalAng, 24, "#292929");
        const rBisect = drawAngleArc(ray.hx, ray.hy, normalAng, reflectedAng, 34, "#8043f0");

        drawAngleLabel(ray.hx, ray.hy, iBisect, 24, "i = " + ray.iDeg + "°", "#292929");
        drawAngleLabel(ray.hx, ray.hy, rBisect, 34, "r = " + ray.rDeg + "°", "#8043f0");
      }

      ctx.fillStyle = dragging ? "#8043f0" : "#292929";
      ctx.beginPath();
      ctx.arc(src.x, src.y, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#292929";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Trage sursa pe semicerc", 10, 18);
      ctx.fillStyle = "#8043f0";
      ctx.font = "700 12px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("i = r", cssW - 52, 18);
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function angleFromPoint(x, y) {
      const L = layout();
      let a = Math.atan2(y - L.pivot.y, x - L.pivot.x);
      return Math.max(-Math.PI + 0.06, Math.min(-0.06, a));
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused) return;
      dragging = true;
      pointerId = e.pointerId;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(e.pointerId);
      const p = ptr(e);
      sourceAngle = angleFromPoint(p.x, p.y);
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      const p = ptr(e);
      sourceAngle = angleFromPoint(p.x, p.y);
    });

    canvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false;
      pointerId = null;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(e.pointerId);
    });

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") {
        paused = Boolean(d.paused);
        postState();
      }
    });

    new ResizeObserver(resize).observe(canvas);
    resize();
    postState();
    (function loop() { draw(); requestAnimationFrame(loop); })();
  </script>
</body>
</html>
