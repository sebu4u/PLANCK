<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viteza</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #292929;
      --line: #e8e8ec;
      --accent: #8043f0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { display: grid; place-items: stretch; }

    .sim {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      padding: 2px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .tab {
      min-height: 34px;
      border: 1px solid #e0dce8;
      border-radius: 999px;
      background: #ffffff;
      color: var(--text);
      font: 700 11px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
      touch-action: manipulation;
    }

    .tab.active {
      border-color: var(--text);
      background: var(--text);
      color: #ffffff;
    }

    .stage {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (min-width: 420px) {
      .sim { gap: 12px; }
      .tabs { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .tab { min-height: 32px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <main class="sim">
    <nav class="tabs" aria-label="Tipuri de viteză">
      <button class="tab active" type="button" data-type="constant">Constantă</button>
      <button class="tab" type="button" data-type="fast">Rapidă</button>
      <button class="tab" type="button" data-type="slow">Lentă</button>
      <button class="tab" type="button" data-type="variable">Variabilă</button>
    </nav>

    <section class="stage" aria-label="Simulare viteză">
      <canvas id="canvas"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    const TYPES = {
      constant: {
        name: "Viteză constantă",
        text: "poziția crește cu pași egali în timp.",
        color: "#292929",
        speed: 0.24
      },
      fast: {
        name: "Viteză mare",
        text: "corpul parcurge distanțe mai mari în același timp.",
        color: "#8043f0",
        speed: 0.42
      },
      slow: {
        name: "Viteză mică",
        text: "corpul se deplasează cu pași mai mici.",
        color: "#292929",
        speed: 0.12
      },
      variable: {
        name: "Viteză variabilă",
        text: "pașii nu mai sunt egali de la un moment la altul.",
        color: "#8043f0",
        speed: 0.24
      }
    };

    let type = "constant";
    let time = 0;
    let paused = false;
    let samples = [];
    let cssW = 0;
    let cssH = 0;
    let dpr = 1;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: TYPES[type].name,
        text: TYPES[type].text,
        paused
      }, "*");
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      cssW = Math.max(1, rect.width);
      cssH = Math.max(1, rect.height);
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      samples = [];
    }

    function speedAt(t) {
      if (type !== "variable") return TYPES[type].speed;
      return 0.15 + 0.22 * (0.5 + 0.5 * Math.sin(t * 1.6));
    }

    function getPosition(t) {
      const margin = Math.max(20, cssW * 0.08);
      const span = cssW - margin * 2;
      const phase = type === "variable"
        ? (t * 0.24 + 0.08 * Math.sin(t * 1.6)) % 1
        : (t * TYPES[type].speed) % 1;
      return {
        x: margin + phase * span,
        y: cssH * 0.52
      };
    }

    function drawGrid() {
      const y = cssH * 0.52;
      ctx.strokeStyle = "rgba(41,41,41,0.08)";
      ctx.lineWidth = 1;
      for (let x = 24; x < cssW; x += cssW < 360 ? 34 : 42) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, cssH);
        ctx.stroke();
      }
      ctx.strokeStyle = "rgba(41,41,41,0.24)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(16, y);
      ctx.lineTo(cssW - 16, y);
      ctx.stroke();
    }

    function drawTicks() {
      const max = cssW < 360 ? 7 : 9;
      while (samples.length > max) samples.shift();
      samples.forEach((point, index) => {
        const alpha = 0.28 + (index / Math.max(samples.length - 1, 1)) * 0.5;
        ctx.beginPath();
        ctx.arc(point.x, point.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(41,41,41,${alpha})`;
        ctx.fill();
      });
    }

    function drawBody(point) {
      const color = TYPES[type].color;
      const v = speedAt(time);
      const arrowLength = Math.min(cssW * 0.2, 34 + v * 95);

      ctx.beginPath();
      ctx.moveTo(point.x + 8, point.y - 22);
      ctx.lineTo(point.x + arrowLength, point.y - 22);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(point.x + arrowLength, point.y - 22);
      ctx.lineTo(point.x + arrowLength - 8, point.y - 27);
      ctx.lineTo(point.x + arrowLength - 8, point.y - 17);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(point.x, point.y, 13, 0, Math.PI * 2);
      ctx.fillStyle = type === "slow" || type === "constant" ? "rgba(41,41,41,0.12)" : "rgba(128,67,240,0.16)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(point.x, point.y, 7, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function frame() {
      if (!paused) time += 0.016;

      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, cssW, cssH);
      drawGrid();

      const point = getPosition(time);
      if ((!paused && Math.floor(time * 10) % 4 === 0) || samples.length === 0) {
        const last = samples[samples.length - 1];
        if (!last || Math.abs(last.x - point.x) > 10) samples.push(point);
      }
      drawTicks();
      drawBody(point);

      requestAnimationFrame(frame);
    }

    function setType(nextType) {
      type = nextType;
      time = 0;
      samples = [];
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.type === type));
      postState();
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setType(tab.dataset.type));
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type !== "learning-path-simulation-set-paused" && data.type !== "trajectory-simulation-set-paused") return;
      paused = Boolean(data.paused);
      postState();
    });

    new ResizeObserver(resize).observe(canvas);
    resize();
    postState();
    frame();
  </script>
</body>
</html>
