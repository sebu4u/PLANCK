<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legile lui Newton</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 90px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    .row input[type=range] { flex: 1; min-width: 50px; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 28px; }
    .tab { min-height: 32px; padding: 0 10px; border: 1px solid #e0dce8; border-radius: 999px; background: #fff;
      font: 700 10px ui-sans-serif, system-ui, sans-serif; cursor: pointer; touch-action: manipulation; }
    .tab.active { border-color: var(--text); background: var(--text); color: #fff; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row"><label for="f">F</label><input id="f" type="range" min="0" max="50" step="1" value="20"><span class="val" id="fVal">20</span></div>
      <div class="row"><label for="m">m</label><input id="m" type="range" min="1" max="20" step="1" value="5"><span class="val" id="mVal">5</span></div>
      <button class="tab active" type="button" data-mode="force">F variabilă</button>
      <button class="tab" type="button" data-mode="mass">m variabilă</button>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const fEl = document.getElementById("f");
    const mEl = document.getElementById("m");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let F = 20, mass = 5, mode = "force";
    let x = 0, v = 0, t = 0;
    const history = [];

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: "Legile lui Newton",
        text: "a = F/m — corpul se mișcă pe suprafață.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      x = cssW * 0.3;
      clampX();
    }

    const BLOCK_W = 44;
    const BLOCK_H = 34;
    const PAD = 10;
    const MAX_V = 520;
    const ACCEL_SCALE = 22;

    function bounds() {
      const minX = BLOCK_W / 2 + PAD;
      const maxX = Math.max(minX, cssW - BLOCK_W / 2 - PAD);
      return { minX, maxX };
    }

    function clampX() {
      const { minX, maxX } = bounds();
      x = Math.max(minX, Math.min(maxX, x));
    }

    function accel() { return mass > 0 ? F / mass : 0; }

    function update(dt) {
      if (paused) return;
      const a = accel();
      const { minX, maxX } = bounds();

      v += a * dt * ACCEL_SCALE;
      v = Math.max(-MAX_V, Math.min(MAX_V, v));

      x += v * dt;

      if (x >= maxX) {
        x = minX;
      } else if (x <= minX) {
        x = minX;
        v = Math.abs(v) * 0.72;
      }

      t += dt;
      history.push({ t, a });
      while (history.length && history[0].t < t - 5) history.shift();
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);
      const floorY = cssH * 0.68;

      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, floorY);
      ctx.lineTo(cssW, floorY);
      ctx.stroke();

      const bw = BLOCK_W, bh = BLOCK_H;
      ctx.fillStyle = "#8043f0";
      ctx.fillRect(x - bw / 2, floorY - bh, bw, bh);
      ctx.strokeStyle = "#292929";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x - bw / 2, floorY - bh, bw, bh);

      const a = accel();
      const arrowLen = Math.min(80, Math.abs(F) * 1.6 + 8);
      const dir = F >= 0 ? 1 : -1;
      ctx.strokeStyle = "#292929";
      ctx.fillStyle = "#292929";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x, floorY - bh - 16);
      ctx.lineTo(x + dir * arrowLen, floorY - bh - 16);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + dir * arrowLen, floorY - bh - 16);
      ctx.lineTo(x + dir * arrowLen - dir * 8, floorY - bh - 20);
      ctx.lineTo(x + dir * arrowLen - dir * 8, floorY - bh - 12);
      ctx.closePath();
      ctx.fill();

      const gh = cssH * 0.22;
      const gy = floorY + 8;
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.strokeStyle = "#e8e8ec";
      ctx.beginPath();
      ctx.roundRect(10, gy, cssW - 20, gh, 8);
      ctx.fill(); ctx.stroke();

      ctx.strokeStyle = "#8043f0";
      ctx.lineWidth = 2;
      ctx.beginPath();
      const t0 = Math.max(0, t - 5);
      history.forEach((p, i) => {
        const px = 20 + ((p.t - t0) / 5) * (cssW - 40);
        const py = gy + gh - 10 - (p.a + 5) / 15 * (gh - 20);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();

      ctx.fillStyle = "#292929";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("a(t) — ultimele 5 s", 18, gy + 14);

      ctx.fillStyle = "rgba(255,255,255,0.93)";
      ctx.beginPath();
      ctx.roundRect(10, 10, 140, 52, 8);
      ctx.fill();
      ctx.strokeStyle = "#e8e8ec";
      ctx.stroke();
      ctx.fillStyle = "#292929";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("F = " + F + " N", 18, 28);
      ctx.fillText("m = " + mass + " kg", 18, 42);
      ctx.fillStyle = "#8043f0";
      ctx.font = "700 11px ui-sans-serif, system-ui, sans-serif";
      ctx.fillText("a = " + a.toFixed(2) + " m/s²", 18, 56);
    }

    let last = performance.now();
    function loop(now) {
      update(Math.min(0.032, (now - last) / 1000));
      last = now;
      draw();
      requestAnimationFrame(loop);
    }

    fEl.addEventListener("input", () => {
      F = Number(fEl.value);
      document.getElementById("fVal").textContent = F;
      if (mode === "mass") fEl.disabled = true;
      postState();
    });
    mEl.addEventListener("input", () => {
      mass = Math.max(1, Number(mEl.value));
      document.getElementById("mVal").textContent = mass;
      postState();
    });

    tabs.forEach((t) => t.addEventListener("click", () => {
      mode = t.dataset.mode;
      tabs.forEach((x) => x.classList.toggle("active", x === t));
      if (mode === "mass") {
        F = 30; fEl.value = 30; document.getElementById("fVal").textContent = "30";
        fEl.disabled = true;
      } else {
        fEl.disabled = false;
      }
      v = 0; history.length = 0;
      postState();
    }));

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
