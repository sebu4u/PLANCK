<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sisteme optice — microscopul</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --text: #292929; --line: #e8e8ec; --accent: #8043f0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; }
    body { display: grid; place-items: stretch; }
    .sim { width: 100%; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 8px; padding: 2px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 0 2px; }
    .row { display: flex; align-items: center; gap: 6px; flex: 1 1 100px; }
    .row label { font: 600 10px ui-sans-serif, system-ui, sans-serif; white-space: nowrap; }
    .row input[type=range] { flex: 1; min-width: 45px; accent-color: var(--accent); }
    .val { font: 700 10px ui-sans-serif, system-ui, sans-serif; color: var(--accent); min-width: 28px; }
    .tab { min-height: 32px; padding: 0 12px; border: 1px solid #e0dce8; border-radius: 999px; background: #fff;
      font: 700 10px ui-sans-serif, system-ui, sans-serif; cursor: pointer; touch-action: manipulation; }
    .tab.active { border-color: var(--text); background: var(--text); color: #fff; }
    .stage { min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%); }
    canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="sim">
    <div class="controls">
      <div class="row">
        <label for="fObj">f<sub>ob</sub></label>
        <input id="fObj" type="range" min="5" max="20" step="1" value="12">
        <span class="val" id="fObjVal">12</span>
      </div>
      <div class="row">
        <label for="fEye">f<sub>oc</sub></label>
        <input id="fEye" type="range" min="30" max="60" step="2" value="45">
        <span class="val" id="fEyeVal">45</span>
      </div>
      <div class="row">
        <label for="tube">L</label>
        <input id="tube" type="range" min="80" max="180" step="5" value="130">
        <span class="val" id="tubeVal">130</span>
      </div>
      <button class="tab active" type="button" data-mode="micro">Microscop</button>
      <button class="tab" type="button" data-mode="tele">Telescop</button>
    </div>
    <section class="stage"><canvas id="canvas"></canvas></section>
  </main>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    let cssW = 0, cssH = 0, dpr = 1, paused = false;
    let fObj = 12, fEye = 45, tubeLen = 130, objDist = 18, mode = "micro";
    let dragging = false, pointerId = null;

    function postState() {
      window.parent.postMessage({
        type: "learning-path-simulation-state",
        name: mode === "micro" ? "Microscopul" : "Telescopul",
        text: "M = Mₒᵦ × Mₒc — sisteme optice compuse.",
        paused
      }, "*");
    }

    function resize() {
      const r = canvas.getBoundingClientRect();
      cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
      dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = Math.floor(cssW * dpr); canvas.height = Math.floor(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function axisY() { return cssH * 0.52; }
    function objLensX() { return cssW * 0.32; }
    function eyeLensX() { return objLensX() + tubeLen; }

    function lensImage(d0, f) {
      if (d0 <= f + 0.5) return { di: Infinity, m: 0 };
      const di = 1 / (1 / f - 1 / d0);
      return { di, m: -di / d0 };
    }

    function line(x1, y1, x2, y2) {
      return { x1, y1, x2, y2, mx: (y2 - y1) / ((x2 - x1) || 1e-9), cx: x1, cy: y1 };
    }

    function evalLine(l, x) { return l.cy + l.mx * (x - l.cx); }
    function intersect(l1, l2) {
      if (Math.abs(l1.mx - l2.mx) < 1e-9) return null;
      const x = (l2.cy - l1.cy + l1.mx * l1.cx - l2.mx * l2.cx) / (l1.mx - l2.mx);
      return { x, y: evalLine(l1, x) };
    }

    function drawRaySeg(x1, y1, x2, y2, color, dash) {
      x2 = Math.max(4, Math.min(cssW - 4, x2));
      y2 = Math.max(4, Math.min(cssH - 4, y2));
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.6;
      ctx.setLineDash(dash ? [4, 3] : []);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawLens(x, label, f) {
      ctx.strokeStyle = "#8043f0";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(x, axisY() - 55);
      ctx.lineTo(x, axisY() + 55);
      ctx.stroke();
      ctx.fillStyle = "#292929";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label, x, axisY() - 62);
      ctx.fillText("f=" + f, x, axisY() + 72);
    }

    function drawArrow(x, yb, yt, color, alpha) {
      ctx.globalAlpha = alpha ?? 1;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(x, yb);
      ctx.lineTo(x, yt);
      ctx.stroke();
      const d = yt < yb ? -1 : 1;
      ctx.beginPath();
      ctx.moveTo(x, yt);
      ctx.lineTo(x - 5, yt - d * 9);
      ctx.lineTo(x + 5, yt - d * 9);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function computeMicroscope() {
      const L1 = objLensX(), L2 = eyeLensX(), cy = axisY();
      const ox = L1 - objDist;
      const h0 = 28;
      const tipY = cy - h0;

      const img1 = lensImage(objDist, fObj);
      const i1x = L1 + img1.di;
      const i1y = cy - h0 * img1.m;
      const h1 = cy - i1y;

      const d0eye = L2 - i1x;
      const img2 = lensImage(d0eye, fEye);
      const i2x = L2 + img2.di;
      const i2y = cy + h1 * (-img2.m);

      const Mobj = Math.abs(img1.m);
      const Meye = Math.abs(img2.m);
      const Mtot = Mobj * Meye;

      return { ox, tipY, cy, h0, L1, L2, i1x, i1y, i2x, i2y, Mobj, Meye, Mtot, img1, img2 };
    }

    function computeTelescope() {
      const L1 = cssW * 0.28, L2 = L1 + tubeLen, cy = axisY();
      const f1 = fEye * 1.8, f2 = fObj * 0.8;
      const ox = 20, tipY = cy - 4;

      const i1x = L1 + f1;
      const i1y = cy;
      const d0eye = L2 - i1x;
      const img2 = lensImage(d0eye, f2);
      const i2x = L2 + img2.di;
      const i2y = cy - 35 * Math.abs(img2.m);

      return {
        ox, tipY, cy, h0: 4, L1, L2, i1x, i1y, i2x, i2y,
        Mobj: f1 / 10, Meye: f2 / 5, Mtot: (f1 / f2),
        img1: { di: f1, m: -0.01 }, img2, parallel: true, f1, f2
      };
    }

    function drawMicroscopeRays(s) {
      const { ox, tipY, cy, L1, L2, i1x, i1y, i2x, i2y } = s;

      drawRaySeg(ox, tipY, L1, tipY, "#8043f0", false);
      drawRaySeg(L1, tipY, i1x, i1y, "#8043f0", false);
      drawRaySeg(ox, tipY, L2, cy + (tipY - cy) * (L2 - ox) / (L1 - ox), "#292929", false);
      drawRaySeg(L1, cy, i1x, i1y, "#292929", false);

      const F1 = L1 - fObj;
      drawRaySeg(ox, tipY, L1, evalLine(line(ox, tipY, F1, cy), L1), "#292929", false);
      drawRaySeg(L1, evalLine(line(ox, tipY, F1, cy), L1), i1x, i1y, "#292929", false);

      drawRaySeg(i1x, i1y, L2, i1y, "#8043f0", false);
      drawRaySeg(L2, i1y, i2x, i2y, "#8043f0", true);
      drawRaySeg(i1x, i1y, L2, cy + (i1y - cy) * (L2 - i1x) / (L2 - i1x), "#292929", false);
      drawRaySeg(L2, cy, i2x, i2y, "#292929", true);
    }

    function drawTelescopeRays(s) {
      const { cy, L1, L2, i1x, i1y, i2x, i2y, f1, f2 } = s;
      const angles = [-0.06, 0, 0.06];
      angles.forEach((a, i) => {
        const col = i === 1 ? "#8043f0" : "rgba(128,67,240,0.45)";
        const y0 = cy + a * 200;
        drawRaySeg(10, y0, L1, cy + a * (L1 - 10), col, false);
        drawRaySeg(L1, cy + a * (L1 - 10), i1x, i1y, col, false);
        drawRaySeg(i1x, i1y, L2, i1y + a * (L2 - i1x), col, false);
        drawRaySeg(L2, i1y + a * (L2 - i1x), i2x, i2y + a * 40, col, true);
      });
      ctx.fillStyle = "rgba(41,41,41,0.45)";
      ctx.font = "600 9px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText("Obiect la ∞ — raze paralele", 10, axisY() - 70);
    }

    function draw() {
      ctx.clearRect(0, 0, cssW, cssH);
      ctx.fillStyle = "#fafafa";
      ctx.fillRect(0, 0, cssW, cssH);

      ctx.setLineDash([5, 4]);
      ctx.strokeStyle = "rgba(41,41,41,0.22)";
      ctx.beginPath();
      ctx.moveTo(0, axisY());
      ctx.lineTo(cssW, axisY());
      ctx.stroke();
      ctx.setLineDash([]);

      const s = mode === "micro" ? computeMicroscope() : computeTelescope();

      if (mode === "micro") {
        drawLens(s.L1, "Obiectiv", fObj);
        drawLens(s.L2, "Ocular", fEye);
        drawMicroscopeRays(s);
        drawArrow(s.ox, s.cy, s.tipY, "#292929", 1);
        drawArrow(s.i1x, s.cy, s.i1y, "#8043f0", 0.85);
        drawArrow(s.i2x, s.cy, s.i2y, "#777777", 0.55);
      } else {
        drawLens(s.L1, "Obiectiv", s.f1.toFixed(0));
        drawLens(s.L2, "Ocular", s.f2.toFixed(0));
        drawTelescopeRays(s);
      }

      ctx.fillStyle = "rgba(255,255,255,0.93)";
      ctx.strokeStyle = "#e8e8ec";
      const pw = cssW < 380 ? cssW - 20 : 220;
      ctx.beginPath();
      ctx.roundRect(10, 10, pw, 72, 8);
      ctx.fill(); ctx.stroke();

      ctx.fillStyle = "#292929";
      ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      const lines = mode === "micro" ? [
        "Imagine intermediară: dᵢ=" + s.img1.di.toFixed(0) + "  Mₒᵦ=" + s.Mobj.toFixed(2),
        "Imagine finală: " + (s.img2.di < 0 ? "virtuală" : "reală"),
        "Mₒc=" + s.Meye.toFixed(2) + "   Mₜₒₜ=" + s.Mtot.toFixed(1) + "×"
      ] : [
        "Mod telescop — fₒᵦ mare, fₒc mic",
        "M ≈ fₒᵦ/fₒc = " + s.Mtot.toFixed(1) + "×",
        "L tub = " + tubeLen + " px"
      ];
      lines.forEach((ln, i) => ctx.fillText(ln, 18, 28 + i * 14));

      if (mode === "micro") {
        ctx.fillStyle = "rgba(41,41,41,0.45)";
        ctx.fillText("Trage obiectul (stânga)", 10, cssH - 10);
      }
    }

    function ptr(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (paused || mode !== "micro") return;
      dragging = true; pointerId = e.pointerId;
      canvas.classList.add("dragging");
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener("pointermove", (e) => {
      if (!dragging || e.pointerId !== pointerId) return;
      const p = ptr(e);
      objDist = Math.max(fObj + 2, Math.min(objLensX() - 20, objLensX() - p.x));
    });
    canvas.addEventListener("pointerup", (e) => {
      if (e.pointerId !== pointerId) return;
      dragging = false; pointerId = null;
      canvas.classList.remove("dragging");
      canvas.releasePointerCapture(e.pointerId);
    });

    document.getElementById("fObj").addEventListener("input", (e) => {
      fObj = Number(e.target.value);
      document.getElementById("fObjVal").textContent = fObj;
      postState();
    });
    document.getElementById("fEye").addEventListener("input", (e) => {
      fEye = Number(e.target.value);
      document.getElementById("fEyeVal").textContent = fEye;
      postState();
    });
    document.getElementById("tube").addEventListener("input", (e) => {
      tubeLen = Number(e.target.value);
      document.getElementById("tubeVal").textContent = tubeLen;
      postState();
    });

    tabs.forEach((t) => t.addEventListener("click", () => {
      mode = t.dataset.mode;
      tabs.forEach((x) => x.classList.toggle("active", x === t));
      if (mode === "tele") {
        fObj = 8; fEye = 50;
        document.getElementById("fObj").value = 8;
        document.getElementById("fObjVal").textContent = "8";
      } else {
        fObj = 12; fEye = 45;
        document.getElementById("fObj").value = 12;
        document.getElementById("fEye").value = 45;
        document.getElementById("fObjVal").textContent = "12";
        document.getElementById("fEyeVal").textContent = "45";
      }
      postState();
    }));

    window.addEventListener("message", (e) => {
      const d = e.data;
      if (!d || typeof d !== "object") return;
      if (d.type === "learning-path-simulation-set-paused" || d.type === "trajectory-simulation-set-paused") paused = Boolean(d.paused);
    });

    new ResizeObserver(resize).observe(canvas);
    resize(); postState();
    (function loop() { draw(); requestAnimationFrame(loop); })();
  </script>
</body>
</html>
